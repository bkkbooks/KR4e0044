body:
  text: 鳴盛集巻四明林鴻撰七言絶句題方壺墨竹明月高懸白玉盤僊人居處近虚寒一枝鳯尾金風裏清露時時滴石壇下山尋朱繼攜琴載酒逺尋君石逕人稀日半曛縱醉也須山上去莫教閒却半牀雲寄周隱者卜築深依野鹿羣姓名何用世人聞平生身外無餘物只有秋山幾片雲題朱舍人爲史太守寫梧竹舍人退食寫閒情公子開椷玉雪清曽向鳯池同夜直掖垣梧竹摠秋聲寄三山舊遊自憐風月酷吟身十載三山不負春豈意凌霄臺下路看花飲酒屬他人放歸言志君門乞得此身閒野樹烟江一櫂還収拾舊時詩酒伴逺尋僧舍入秋山題呉江埀虹橋雲㠶秋晚過埀虹落日鯨波動逺空欲借僊家遼海鶴月明吹笛水晶宫曉行前山樹暗月朧朧馬色雞聲共曉風不爲逢秋多感慨只縁身在别離中將之海上羣公相餞至龍津百尺雲㠶絓海霞勞君相送到天涯重來應恐清秋晚落盡清泠桂子花宿逆旅聞泉聲練瀑飛空作雨聲樓虚月白旅魂驚相思不道無歸夢自是離人夢不成將之鐔城留别冶城諸彦五首冬靑花外雨霏霏半濕征鞍半濕衣此去孤舟無伴侶空江惟有白鷗飛其二十載吟秋卧翠微三年宦薄日邉歸玉華花鳥應相送依舊閩南一布衣其三知己相攜欲别難白波春草路漫漫劍潭誰道無明月不似清泠把酒看其四荔子花開海雨晴分㩦同下越王城從來送别多愁怨惟有靑山忘却情其五舟停桂櫂騎停轅落日江頭酒一樽誰道劍溪非逺别碧波靑草摠銷魂閨女焚香桂殿焚香酒半醒露華如水撲銀屏含情欲訴心中事羞見牽牛織女星溪山春曉香霧濛濛濕翠霞半簾殘月到仙家野橋初過鶯聲曉乍見春溪水漲沙江亭初夏依依緑荇動薫風極浦㠶邊望不窮最愛憑高上江閣一時清興與誰同野館秋聲淅瀝寒聲處處疑空庭寥閴月明時蕭蕭卧聽生秋思草木凋零人未知隂崖雪霽隂林霧氣曉來分峭壁寒光射嶺雲一自投簮歸去後此身牢落與誰論題李白問月圖玉盃問月乾坤窄綵句吟秋鬼魅愁千古神遊何處在若非蓬島即瀛洲詠懐十二首女螺江上送蘭橈長憶春纎折栁條歸夢不知江路逺夜深和月到紅橋其二驪歌聲斷玉人遙孤館寒燈伴寂寥我有相思千㸃淚夜深和雨滴紅橋其三殘燈暗影别魂消淚濕鮫人玉線綃記得雲娥相送處淡烟斜月過紅橋其四素馨花發暗香飄一朶斜簮近翠翹寶馬未歸新月上緑楊影裏倚紅橋其五春衫初試淡紅綃寶鳯搔頭玉步搖長記看燈三五夜七香車子度紅橋其六溶溶春水漾瓊瑤兩岸菰蒲長緑苖幾度踏靑歸去晚却從燈火認紅橋其七一襟離恨暗魂消閒却鳴鸞白玉簫燕子不來春事晚數株楊栁暗紅橋其八傷春雨淚濕鮫綃别雁離鴻去影遙流水落花多少恨日斜無語立紅橋其九綺窓别後玉人遙濃睡纔醒酒未消日午捲簾風力軟落花飛絮滿紅橋其十三千客路動行鑣逺别歸來興欲飄秖恐鳯樓人待久玉鞭催馬上紅橋其十一玉階深露滴芭蕉獨倚屏山望斗杓爲惜碧波明月色鳯頭鞋子步紅橋其十二雲娥酷似董妖嬈每到春來恨未消誰道蓬山天様逺畫闌咫尺是紅橋挽沙陽朱氏九首靑樓十二敞銀屏長記生前幾醉醒今日重來人不見七峰猶似黛眉青其二珠沉玉殞兩茫茫十里溪流與恨長依舊春山花似綺不知何處瘞蘭香其三二十年來一夢歸楚臺秦館事應非春魂想化西園蝶猶向碧桃花下飛其四緑楊兩葉想眉顰誰寫新詩詠性眞一自朱樓人去後鶯花不似舊時春其五玉露幽蘭憶淚泫殯宫幽暗夜如年空餘舊日香奩句一度悲吟一悵然其六青鸞影斷杳難囘暝掩紅顔向夜臺可惜玉樓空鵲鏡也隨羅綺葬寒灰其七舞袖何年化作雲玉簫聲斷鳯離羣春風似惜泉宫恨片片吹花落古墳其八蘭銷桂蠧雨初晴寂寂泉宫夜不明聞說七峰山下水至今流恨也呑聲其九栁臺花榭寄塵踪名籍蓬萊第幾宫晚出人間風露表佩聲夜夜響瑤空緑楊燕二首上國䌓華畫裏看緑楊紫燕鬪春闌金河堤上朝囘路最是飛花撲玉鞍其二千株積翠濃如墨兩岸䌓華事已非殘燕不知春已去斜風細雨故飛飛題宋故宫御屏芍藥雨暈霞綃粉繪香品流應得亞花王五侯池館春如夢無復䌓華似洛陽題竹二首醉墨淋漓濕未乾拂雲雙玉倚秋看别來嶰谷空林月幾度凄凉篴裏寒其二南山野老種琅玕錦籜初翻烟雨寒盡是伶倫裁鳯管芸窓留得一枝看畫松長風蕭颯起毫端雪幹蒼蒼㡬歲寒黑入太隂雲雨合就中疑是老龍蟠畫竹玉節姢姢老雪霜蒼梢勢欲拂雲長南風昨夜吹烟霧添得虚堂六月凉弔屈原汨羅東去水滔滔弔古臨流誦楚騷千載獨醒惟有子古今醉死盡英豪歲暮别友筆硯相從又一年今晨判袂各紛然臨岐不用嗟離别明德相期貴勉旃題小景圖林木疎疎小徑分石泉嵐氣絶塵紛抱琴野客歸何處間却松窓半榻雲蘓武嚼雪圖誓與匈奴不共餐暫將氊雪慰摧殘寄言漢主加調膳一片丹心想不寒古劍歐冶何年百鍊成深藏石匣隱豐城終當化作神龍去不逐羣雄事戰爭荷錢田田翠蓋㸃清漪非範非模逈出奇自是天工陶鑄巧一畨清富屬馮夷苔錢莓苔雨過似錢勻萬㸃沿階翠暈新陶鑄每憑風雨力似憐野客太清貧題鄭昭甫寫張騫乗槎圖滚滚黃河天上來茂陵底事望蓬萊早知愽望乗槎便虛築通天百尺臺初出秣陵賦得二首生離死别已聲吞淮水東流萬古寃今夜石頭城下月何人把酒酹詩魂其二豈料明時竟陸沈終天不冺九泉心歸魂想逐天邊月夜夜清泠石上吟書宗兄懐之信後遷人西去逐秋風萬里雲沙路不窮遙憶清泠諸友伴雙流血淚望南鴻寄周生生事蕭條鷗鳥知春來長憶看花時秖今酒伴俱零落說著高陽淚便埀書寄鄭二先輩粤國佳人歌竹枝呉航歸客不勝悲送君别後秦樓月尤見清光似昔時題牧牛圖緑草萋萋黃犢肥半蓑殘雨卧東陂烟深埜水行人絶家在寒林月上遲題梧竹憶昔空齋獨寢幽隔窓風雨忽颼颼畫中却憶山中夜不得吟秋便見秋題幽蘭圖蘭葉微紅玉露秋碧山流水思悠悠美人何處空搖珮見畫相思幾度愁題蘭竹圖楚山湘水亂雲遮欲徃題詩路更賖昨夜燈前醉看畫雨枝風葉亂橫斜梨花鸜鵒梨花開遍遇清明鸜鵒飛來榖雨晴半捲湘簾玉堂靜酒醒相對溢吟情枇杷山鳥沉香烟暖碧忩紗緑栁隂分夏日斜夢覺只聞鈴索響不知山鳥啄枇杷平林歸牧松林日入烟火生風起時聞長笛聲㶚頭芳草無歸路騎向清溪沙上行牧牛睡意曽隨黄犢卧閒行夢入虚林春草青爲報南山空扣角漫漫長夜爲誰醒書懐緑蘿吹雨暗青燈門掩寒䖝夜夜聲風景春來倍零落向人衰栁更含情送監生兩袖春風錦綉新五花騘馬拂輕塵天顔寵勞殊勲紀四牡皇華有幾人對菊詠二首獨對秋風感客懐南山舊業半蒿萊浮生想被微名絆知得花前醉幾囘澤下秋風五栁稀葛巾强醉坐東籬花間獨照無青眼今日相看似昔時口占二首城上秋風起暮笳燈前有客正思家明朝九日須當醉㡬度能同對菊花江海年來已倦遊劍南偏喜故人留對牀今夜休聽雨一滴空階一滴愁鳯凰臺昔人從此吹簫去萬古高臺對水流試看舊時明月影夜深鐘鼓五雲秋春詞夢囘明月隱銀屏香冷微風動翠綾從此離心無處寫起來花下拜三星竹枝詞二首呉王宫前春水平㶚陵橋上栁色青江水不流離恨去楊花長送逺人行湖上鴛鴦飛一雙人生最苦去他鄉郎舟撞入荷花裏引蔓牽絲恨更長五言絶句題白蓮二首淡月瑤池夜微風泰華隂翠翻擎雨蓋玉冷墜波簮其二神妃遊洛水照影弄晴暉明月沉珠珮香風動羽衣詠草閉門春雨後芳草上階生詎知嚴霜月聊復一時榮流沙江夜泛登艫日向夕出浦雲已平月黒渡江處北風蘆葦鳴辭𤣥之茂才有公冶長之譴素秋云李跫焉逺别以平昔效言志之學多聞起予李杜文風自兹索然耳咏河梁之句血淚沾襟聞易水之歌目眥盡裂古今雖殊慕義慷慨其致一也因效楚聲以歌不計文理之工緻凡我同志相應同聲陟彼岐兮夷行擊予劍兮慨慷目送逺兮精神飛揚披浮雲兮視天茫茫駿骨委絶兮駑駘服箱鸞鳯逺竄兮鴟鴞翺翔皇鑒不忒兮不臣無將滄江秋思圖山蒼蒼兮欲秋水凝波兮不流若有人兮遨遊縱一葦兮孤舟挾天風兮颼颼喪予懐兮悠悠往者如可作兮吾將和滄浪之謳詞蘓武慢八首大塊初分胚胎既孕萬物自然生露馬出於河龜浮自洛從此人文森布羲畫亡言姬爻有象斯理亘乎今古問其中槖籥樞機太極乃羣生之母細看來納納乾坤漫漫宇宙好類闔扉啟戸六子相磨五行互竭兩曜不停烏兔道在目前理非身外欲悟㡬人能悟待先生勘破先天披髮騎麟歸去其二性水流湍情田不耨堪嘆世人猖獗土鼓風殘結繩政逺吾道𣺌如一髮箕帚誶言耰鋤德色厖俗凜乎將輟樹桔橰喚起機心却笑灌畦之拙孰不知孝本柴愚學傳參魯天道本無言說克讓克仁飾非飾智方寸要君分别達則經綸窮乎蓬累到此始稱豪傑有幾人俯仰無慙浩氣直干雲闕其三擾擾勞生飄飄過客天地古今逆旅滄海塵飛南山石爛烏兔㡬時能住埜馬光隂浮漚宇宙何異草頭微露有幾人了了惺惺識破死生之故看古來事業功名榮華富貴畢竟在於何處奔走無休機關未定華屋㡬成墳墓醉裏乾坤閒中歲月此是穩行平路倩誰人喚起莊周斗酒與談𤣥素其四家本儒流身穿逢掖出入義途仁里洞鑒機心㝠搜海岳愽得一貧如洗作賦南宫吟詩北苑萬句不如杯水問先生何苦如斯秖是好之不已最愛是竹寺秋眠花樓夜飲醉倒不知天地禮法之徒是非評論看得不如螻蟻勘破興亡超乎流俗莫怪不營生理吐胸中萬斛珠璣有㡬箇富人能比其五歛跡南宫乞骸北闕長嘯掛冠歸去昔日詩朋舊時酒伴不棄又還相顧緑水林塘青山别墅儘有清遊佳趣筭從前枉縛微名一夢迨今才寤閒來時古寺分茶隣家看竹任我清狂如故牧犢賡歌漁樵共話著箇埜人巾屨理亂休聞起居自若一枕水雲山雨問先生此外何如目送逝波東注其六北壠耕雲南溪釣月此是埜人生計山鳥能歌江花解語無限乾坤生意荷鍤歸來擔簦閒眺風景又還光霽筭人生奔走如狂萬事不如沈醉細看來聚蟻功名戰蝸事業畢竟又成何濟有分林塘無心鐘鼎誓與漁樵深契石上酒醒竹間茶熟别是水雲風味順吾生素位而行造化任他兒戯其七養就嬰兒孕成姹女一派華池清沼朝飲秦樓暮遊炎海倒著雨巾風帽銕􅐟一聲瑤琴三弄隱隱月高星小笑梁園物換人非蛺蝶又飛烟草想從前廣漠歸來崆峒讌罷人世㡬經昏曉瑤草長春𤣥珠不夜前後紫鸞飛繞生死如休榮枯似夢欲了㡬人能了指白雲深處吾廬無數野花啼鳥其八萬古憑高一聲長嘯勘破古人公案讓本陶唐征於湯武不過授賢治亂姬運東衰夷氛北漲赤子可嗟塗炭善桓文烈烈轟轟傾厦頼乎支幹爭奈何戰國紛紛嬴秦擾擾元氣等閒飄散謙讓未遑詩書安事吾道厄於炎漢陋矣河汾賢哉濓洛再整殘編斷簡倘若非奎壁光輝長夜㡬時能旦滿庭芳錢塘舟中述懐小雨催寒輕烟弄晚空江一望糢糊片㠶東去誰念旅懐孤寒雁連翔欲下還驚起相呌相呼栖泊處擁篷欹枕清夢繞菰蒲還思行樂處有高陽酒侣洛浦嬌姝空嬴得半生酒困詩癯不道年來憔悴但顧影冷笑微吁螺江上天公還肯容我釣鱸魚念奴嬌咏雁登臨送目正木落衡臯水寒湘渚碧海青天三萬里望㫁驚弦弱羽字寫璇空陣横紫塞夢入黄蘆雨錦箋一劄漫留别後愁語空江水碧沙明閒情誰與共晚汀鷗鷺二十五絃彈古恨逐伴又還飛去仙掌月明長門燈暗多少悲凉處千秋哀怨秖今猶遶箏柱玉漏遲記紅橋故人春遊驚鴉翻暗葉桐花墜露曲房新曉蠟炬香籠凖備惜花起早翠沼凝脂氷活呵素手襯粧初了香徑小水溶溶波暖正宜臨眺誰信造物無私偏付與容華稱顰冝笑更放花朝日日霽多隂少不惜千金費盡但惜取數峰殘照歸騎杳縱醉宜眠芳草青玉案釣臺遇雪桐江倚櫂蒹葭瞑怪倦枕朝寒勁拂曙掀篷銀萬頃犯星人去清風名在尚想羊裘冷簮纓悮我山林興幸喚醒槐安塵夢境烟浪迢迢歸路永汲江燃竹買魚沽酒沈醉休教醒臨江仙秋登平逺臺身是金門簪筆吏天教未老歸來秋風扶醉上層臺百年清夢醒萬里壯懐開看取古人何事業一抔黄土蒼苔閒身差健且銜杯夕陽漁􅐟送寒色雁書催鳴盛集巻四
