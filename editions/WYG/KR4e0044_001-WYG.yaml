body:
  text: 鳴盛集巻一明林鴻撰五言古體擬古七首北辰何巍巍居為衆星宗𤣥冬杓在北青陽乃旋東七曜潛斡運四時自成功靜觀造化機毋乃君道同其二神龍潛深淵不在尺水池飛鳳將鎩羽亦擇梧桐枝玉以貞自珍蘭以幽見竒君子莫屈身身屈道乃卑其三迢迢洛陽城雉堞何逶迤上有天子宫下列公侯居外廐鳴騕褭中饋進鮮肥身無澣濯服路有餘粱脂巍巍金馬門云是上天梯仕宦有㨗徑請託無虚時布衣謁公家言拙氣亦卑丈夫無所求守道寧食薇其四倦僕秣我馬駕言將驅馳戚戚感路人問我去何之答云商山路幽谷多紫芝樂與素心人採掇療朝饑路人聽斯言揮淚持我歸舉手謝之去吾駕不可違其五翩翩雙白鶴久在樊籠中刷毛向朝日舉翅傷秋風雖蒙惠養恩自比雞鶩同歎息此珍禽黙黙傷余衷放之煙霞表飲啄詎見蹤其六秋月何皎皎素魄流虛堂攬衣步清影玉露生凄凉感之獨徘徊驚波疾流光雖無景公淚惻惻還堪傷世路多榛棘人心競羊腸得酒且須傾毋令空鬢霜其七千金買駿骨寧與駑駘同乃知陶潛翁避俗甘固窮縱酒愛五栁折腰若為容葛巾漉春釀庭柯響青􅋛怡然日為樂自視村野農而我頗疎散失身塵網中翹首企髙步遥遥安可從感秋十九首撫劍中夜起氣候何凄清天髙白露下北斗當前楹嗷嗷雙飛鴻随陽亦宵征㣲禽爾何知寒暑攖其情始知玩物化中復念吾生三十志有立一經尚無成緬懐古哲人信與大運并道在無終始時來暫衰榮感歎不能寐延首東方明其二中夜有遐想假寐登崑崙飄飄列仙人授以漆書文𤣥鳳振其羽三芝吐靈根文螭為我駕赤豹為我蹲覺來戸牖虛明月當前軒服膺念古訓抱經究㣲言中道誠可尚荒謬何足論其三大人秉乾徳精誠應純剛在天麗星日在地為丘岡六龍無停馭大化何茫茫喈喈𤣥圃鳳知時亦鳴陽伏䑕忌靈曜飛蟲惡炎光陰類各自私至明庸何傷其四太古號無事其人如鹿麋塊然具中和焉用禮樂為三皇不同軌五帝亦異治練絃與明水汲汲挽其漓哇淫起鄭衛綿蕞紛秦儀聾盲世耳目真朴無復遺大運暫衰歇至理豈盈虧鴈行與魚躍誰用此道推所以横渠翁千古有餘悲其五姬轍既東馭羣雄踰其防夷氣熾六合陽精黯無光壯哉東海君歘起埀衣裳霸圖雖􅂱􅂱王道終茫茫麟經托南面筆削嚴秋霜至今千載下共戴君為綱其六陽精自東生陰魄復西沒兩曜無停機萬古一超忽方平笑麻姑緑鬢已成雪誰識青青松蟠根向溟渤其七秋氣悲萬物攬衣坐中庭仰視明月光俯聞候蟲鳴人生㑹有涯歡樂當及時榮期但長歎墨子徒自悲驅馬被紈綺雕盤割鮮肥酒酣論意氣中心貴相知終當委運去得飲無復疑其八至人不凝物逍遥可延年貪者乃徇名冠盖卧丘樊懐璧讐匹夫深藏貴若淵邦家覆佞口仲尼欲無言始終互相竭盈虧毎旋沿黙觀一元運至理猶張絃其九威鳳志八表鷙鳥思逺擊志士徇苦節秉心猶鐡石黔榖恤齊饑餓者嗟輟食朝歌墨回車勝母曾不入悲哉表旌日行矣申屠狄世無成子髙疇能掩真跡其十君位曰大寳惟聖能矜持彼狂亂其經縱欲日淪迷夏桀墜禹服商受傾湯基蹙國向沉湎投身殞蛾眉禍福共倚伏理亂亦相因下民尚有嚴皇天本無親姬文掩枯骼四海咸稱臣十一季世尚逰俠使氣凌諸侯就死輕一芥含恩重山丘荆卿觸秦怒漸離重燕憂小節若可尚大義非良籌嗟哉黄金臺千古令人愁十二朝登北邙坂墟墓何纍纍懐哉泉下人惻然我心悲往若不可復來者毎如斯膏火煎萬族紛紛競刀錐生存華屋居死與草木萎愚智同土壤英靈竟何知所頼賢哲士千齡名不隳十三大塊覆羣迷疇能㑹其妙狂夫毎如醉至人獨先覺草木養氣體金石駐精魂多岐但驅車孰踵𤣥𤣥門漢武志三島秦皇窮八垠焉知淡泊水可沃靈臺焚十四大化有培覆貧窮固其常奈何東鄰子索居多慨慷在桁無懸衣晨飱曠儲糧飢寒不自保妻子安得將投杖出門去仰逐浮雲翔周流極四海組練歸故郷寄語寰中士空乏庸何傷十五四時互相竭兩曜無停軸夏炎方滿盈秋氣忽已肅空閨有佳人十載常獨宿中心豈不貞處闇誰見燭願為明月珠流光照君屋十六空谷有隱士服食常不周藿羮笑鐘鼎裋褐輕王侯樵漁有時閒但與麋鹿逰持身豈不隘安命固無憂我願見其人欲往道無由迷途諒未逺反策營吾丘十七聖人處憂患㣲言在明夷世人昧獨處悔吝相與期君看文毛豹隠霧南山陲寄言狂馳子曷用此道推十八聖人立名教朋友居人倫異體相謀合惟徳可為鄰何如便佞子婉孌來相親昔為金與蘭中道若參辰投以明月珠按劍反見嗔對面隔山岳欲達路無因數疏既有戒昌言跡非真惟應管鮑交此道恒自信十九聖哲尚中道大哉美隨時出處雖殊途久速與運期莘野方釋耒九五以為師西山去不返殷士寧食薇鴻鵠横九霄鷦鷯安一枝物類同如此子心何所疑堯階伊昔陶唐氏埀衣貴無為所存昏墊憂焉知宫室卑土階一何陋荒蕪任茅茨雖云三尺崇足仞千載基陟降趨四岳攝升朝百揆雍容揖讓間庶績皆咸熈彼昏瓊其臺惟狂瑶其池亂階一以啓顛躓良在兹吾聞大聖人廣居宅八陲禮門既大闢義路亦載馳居處雖儉素徳業乃巍巍朂哉後來人可以為箴規無諸釣龍臺懐古三首無諸昔建國赤土䟽王封築臺青𠖇上埀釣滄江龍乘龍去不返千載如飛蓬只今荒臺上寂歴多遺蹤我有太古懐來吟江上峯天青海氣滅地古寒煙濃潭水綠萬丈秋岑碧千重登臨未能已落日催孤鐘其二甌閩古夷服無諸漢英雄秦鹿既已死却辭隆凖翁組練照海色旌旗來故宫赫矣茅土業大哉開闢功事往滄海變龍飛霸圖空昔日釣龍臺空餘江水中桂殿苔色古空陵雲氣紅朝夕卷寒潮隠隠聞雷風登臨畢餘景感歎無終窮其三無諸東海上有國在秦先一朝逐秦鹿戈甲相勾連髙才已得志論封亦徒然歸來築髙臺投竿釣蜿蜒屠龍雄按劍拂拭滄洲煙英風振海岳古月經蠻天昔人不可見蹤跡復堪憐閒來弄秋水漁情藹清川雲髙碧海凈日落千山妍莞歌古臺上醉向酒家眠西狩顓頊閉天地𤣥㝠始司冬明堂敞八水井邑閒九農東魯考王制西狩收歳功天仗列鉅野雲師掩象䝉鳴鐘天地震列焰川原紅置張六合窄囊括九有空熊羆既股栗豺虎無留蹤夫何𤣥枵精亦困鉏商弓五趾運坤軸孤觸鳴蒼穹舉武中矩度流音若黄鐘虞人一驚告尼父心已恫瑞物際頽運嗟哉吾道窮遺經告文成筆削埀至公飛霜礪斧鉞白日開鴻濛感歎終絶筆千古來悲風塞下曲交河冰是路天山雪作花舉頭猶漢月沒足已胡沙逺戍連烽火嚴更起清笳將軍帳中卧萬馬夜不譁國恥猶未雪壯士莫思家其二宛馬金作勒壯士鐡為衣横行出塞門日落黄埃飛匈奴倉卒至士卒被重圍戰餘平野中惟見空鞍歸家中白頭母猶自倚寒扉為陳少府賦望雲髙臺臨廣逵上抗浮雲端逰子思親闈登之以遐觀親闈不可見白雲阻河關顧兹好爵縻何當一承顔登山山有岐渉水河有湍王事雖賢勞敢辭陟岵難青天何茫茫大地亦盤盤歸袖欲奮飛願附鴻鵠翰寄衣曲漢月絓庭樹胡霜拂城樓邊人一夜寒深閨始知秋起來理征衣纎手一何柔雙杵㡬不勝寸心未能休梧葉下淅淅草蛩鳴幽幽月明嗟慰意風急復含愁白露下蘭心蘭心亦枯槁妾家有髙臺下見漁陽道明發寄征人三挹蘼蕪草題罔極堂巻孰謂江海廣江海亦有湄繄我父母恩浩蕩斯無涯依依念終養惕惕常如飢鞠育信勞悴欲報將何為仰睇孤鴻翔俯悼寒蛩悲豈無舟與車徬徨將何依髙堂儼陟降愾然方在兹感彼樹上烏朝出暮乃歸㣲物具至情未遂反哺私我何抱深痛拊膺淚如絲哀哀九泉下永以長酸嘶謁昌黎先生祠兼呈王潮州窮冬到南海驅馬韓山灣繁霜野水落鱷溪清且寒伊昔潛修鱗白日飛風湍壯哉昌黎翁洪流靜而安伊余謁遺廟兼以窮遐觀地古白雲滅潮來滄海寛夫子繼芳躅而能障波瀾丈夫遇知已遲暮彈吾冠哭迭漳州九原何茫茫哭聲迴彼蒼含悲復含喜身死名不死夷哉清漳途可駕睢陽軌永激後來人千秋作臣紀春日首陽懐古東風蕩霏靄旭日生岩巒清飇洒襟佩聊以窮躋攀逰目俯髙墳歘然復悲酸清標香名立幽壤芳骨寒孤騫仰鸞鳳鳥雀易所飱濁流激清波洒然天地間古木翳芳祠野蕨迷空山遲回竟將夕振策未能還本一齋元始但一氣厥狀含鴻濛卑髙猶未陳至理已混融粤從太極分𤣥白自汚隆天澤肇履象中正根民衷三皇不沿轍五帝亦殊風萬殊雖支離一體當貫中天地乃吾體清明元在躬寄言希顔徒朂哉克已功驅車篇送張志道奉親柩歸清潭驅車出東門我車已載脂况此苦寒月歌此陟岵悲夙駕指晨星日入不遑棲道路豈不遥筋力亦云疲飛鳥為我吟孤禽為我啼浮雲結為斾迴風亦凄其引領望故山丘壘何纍纍感彼首丘志懐哉蓼莪詩指佞草元氣殊萬類惟人最通明夫何此靈草亦識讒諛情揚揚吐竒芬毋乃太㣲精孤根寧獨立不與凡卉并宵衣朝百辟丹陛秋風生姦回既屏迹利口亦潛形周禾徒同穎漢芝空九莖雖能誇美瑞曷足資治平寄言持斧者可與同令名方節婦詩北堂樹萱草我憂終不諼念彼結髪人溘與朝露先眷言在諸孤􅂚敢同下泉昔看俎豆嬉今見弱冠年慨賢夏侯傳永歌柏舟篇懐哉古人心白首敢自憐羅浮觀日圖昔有學道者擔簦海上行宴坐羅浮峰内視觀無形晞景正東豁滉漾扶桑明雲濤既洶湧龍獸亦悲鳴吾聞混沌分坤軸東南傾百川走空虛日乃生窮溟未覩大明運安知至陽精願從列仙徒散髪倚雲屏三花潄雲液五内含晶熒回觀羅浮圖陋哉山海經心逸齋二五妙凝合清明在吾軀惟心萬物靈湛然抱中虛知誘由外感逐物情乃趍以兹巧偽萌營營實勤劬若人志前修作意惟聖謨百體既順正天君日安舒靜處守仁宅紆行由義途希顔古有訓朂哉逢掖徒海上讀書浮雲薄海色萬里如秋空青蒼杳無際島嶼蟠蛟龍上有讀書者結茅誰與同朝餐海上霞夕友滄江翁乘桴嗟尼父把釣思任公猶慕魯連子不受却秦功千金若士壤清名弔髙風愧予老儒術白首且相從贈昇𤣥子希夷本無象廣漠難具論孰知𤣥子名强曰衆妙門至人守無為目擊道乃存精神應龍健變化迎鵬搏四氣歸槖籥三花洞天根逍遥大塊中豈在登崑崙飲酒儒生好竒古出口談唐虞倘生羲皇前所談乃何如古人既已死古道存遺書一語不能踐萬巻徒空虚我願但飲酒不復知其餘君看醉鄉人乃在天地初甘露甕汙罇已寥閴土鼔久不鳴大鈞吹洪爐厥器陶甄成厥器彼伊何儲彼天地精庶徴順時若至和妙勻凝醇醴結五色晶液若瓊英天既不愛道人胡惜其情所以大聖君篤恭天下平題唐亨仲三友圖賦質異根本秉心同嵗寒翛然山林資陋彼桃李顔操類三益賞心齊二難寄言端居者冰雪宜相看金雞岩僧室逺公青蓮宇百尺構雲闕一徑入松蘿山泉濯苔髮石房彈玉琴清響在林樾夜來滄海寒夣遶波上月㣲吟白雲篇髙興了未輟未能悟聲聞安得離言說逰芙蓉峯密竹不知路渡溪㣲有蹤懸知石上約定向松間逢物候變黄鳥菖蒲花蒙茸相望不可即裊裊霜天鐘秋江獨釣圖清飇晚溜溜白水明濯濯投竿坐盤石風葉衣上落吾心與天逰寧知取魚樂為朱氏賦石潭軒飛軒瞰古潭潭色杳深翠靜淵如有容混混百源㑹秋臨天影寒夜潄月華碎吾心若虛空何物為蓬累同周秀才𤣥與東白明逺二上人期宿芝山不至㕓居厭紛擾恒思宿隂岑夙期道門友共兹清夜吟彈冠起新沐㣲風披素襟行行止空門夕景倐已沉不見雲中僧虛堂閉煙林應物本無住焉知來去心良㑹既已暌中情一何深詠歸値新月聊復鳴吾琴題逰魚圖深水荻芽短淺水荇葉稠逐隊聚還散戲波沉復浮東鄰已結網西家潛下鈎江湖可相忘予心何所求泛舟西江積水可利渉方舟况同乘悠然西江上遂望雲中僧出浦見落日前崖隂始凝秋風忽颯㳫海雨随奔騰稍移流沙河又見夕影澄擁棹向危壁推篷見古藤枕藉信水宿躋攀候晨興兹逰意多愜况也多良朋題醉道士黄冠何羽人恍是全椒客一壺常兀兀以飲混其迹歸來秋山空卧向松下石誰知郡齋人含情正相憶經東山别墅别墅在東山經過感疇昔縱横醉時墨猶在池上石林氣颯以凉山容淡將夕緬懐携手人念念不能釋寄丘令海國民俗古清朝民物閒况兹得良牧理人絃誦間吏散日已夕雲歸鳥随還髙齋䕃嘉樹横琴對逺山伊余安蹇劣歸休謝朝班出處雖異途雲林近怡顔兹焉仰髙風望望心所攀送湖南歸粤志士本激烈况當離别情直氣不得發逢秋吐商聲浮雲蔽長空驅馬去孤城廣川無輿梁一葦詎能横將尋故山隠自芟荒草耕蠧書束髙閣龍劍日夜鳴行路由正途能使山岳平端居息機心卧聞螻蟻爭知君重交結臨分吐平生寄袁憲史金風動林木朱炎謝餘暉新凉起羸疾振我塵中衣貧居滿衰草鳥雀遶庭飛閒心本無營看山忘渇飢念兹素心人于今宦情㣲粤鄉初揺落滄江鱸正肥晤言一携手共息胸中機斬蛇劒秦氛熾天地大澤蟠蜿蜒潛龍厄初九鹿迹方茫然千里送徒人三盃拂龍泉紫劒混赤精紅光吐青蓮壯哉三尺鋒可以摧金天粉首明月中飲血秋風前素靈何嗷嗷老淚翻蛟涎芒碭起風雲咸陽若浮煙揮洒六合清提挈神氣完始知百鍊鋼永與金刀堅赤壁曹瞞窺漢統東面朝諸侯鼎足猶未分屯䝉迷九州桓桓長沙裔歘起揮戈矛兩雄不並立固知寧相謀朔風吹旌斾飛霜肅貔貅飲馬涸天塹投鞭填山丘建業既震蕩羽檄如星流衆議徒𤨏𤨏獨斷誠嘉猷㧞劒碎玉几揚旗建車舟周郎拂白羽談笑有良籌馮夷鼓駭浪天吳扇雄飇烈焰蕩萬壘飛灰喪千艘論功何顯赫返駕誠包羞再光東都業一洗瘡痍瘳往事既漫滅山川尚綢繆昔聞龍虎爭今見麋鹿游峭壁絓海月洪濤漲清秋訪古弔陳迹開樽發𠖇搜醉來卧煙靄天地如蜉蝣題草澤遺書買斧入城市伐木歸中林中林多樛木實勞匠者心林深閴無人清風聞嘯音雲濤既浩蕩龍虎亦悲吟筋力既不惜但恐白日沉願言秘大樸俯首從哇淫酒醒酒熱中夜起散髮㣲風前煩襟忽冲散髙咏蒼凉天湛池和露藉虛庭留月眠寧知明日事聊復一欣然曉登金雞山呈王六博士劍客無所懽登髙眺清曙於時値揺落况乃閒遊阻闗河一千里飛鴈杳難度積水明秋空蒼山落寒楚荒凉誰問俗慷慨即懐古長嘯歸去來餘意在蘭杜送尚抱灌往閩南采詩予生草澤閒鼓腹歌唐虞奈何際板蕩奮劒當前驅千金酬壯士白璧買良姝放浪裘馬門嗜酒縱樗蒱市朝既變更部曲歸里閭三十始讀書謬為章句儒閉門謝賓從窮巷生寒蕪南山既嘯傲擊節聊自娱故人西北來將歸滄海隅自言河岳英以俟觀風車忽忽僕馬疲寥寥歲云徂積雪照天地嚴冰寒江湖祖席臨東門欲發仍躊躇贈之五雲章飲以雙玉壺答黄逸人大道如砥平我車不方軌明時世景清夫子乃蓬累有客天上來為說黄金臺所市既駿骨所覊乃龍媒五月上武陽炎風焚大荒豈伊道路難欲往河無梁蓽門逢君子酣歌日中市披髪行且吟時人盡驚異既知歸日落欲往秋風作誰同寗子歎且效榮叟樂離别逺將歸凉風吹布衣南飛有鴻鴈毋使信音希春日同諸生野飲效陶體始春風日嘉出門竟何之所欣携諸生駕言陟嶔􅏟谷風已嘘萌好鳥亦鳴枝蔬果屬時新有醪已載巵中觴發意氣列坐各言詩悠悠天壤間斯樂希浴沂夣清泠臺寄冶城舊逰羣山際海上道山獨蒼蒼上有清泠臺碧蘿蟠石床伊昔盛冠蓋琴樽此翺翔暮色海天冷秋風松澗凉今來阻登臨獨有夣飛揚題寄同心侣願因南鴈翔岷峨秋晚岷峨一千仞秀色横清秋雲蟠隴蜀盡水入巴江流旭日海上來蒼蒼樹色浮陽厓氣已變石林陰未收疏鑿有古跡登臨仍壯逰落日下層巔懐哉神禹憂雙竹軒開軒逺山際讀書修竹陰以兹歲寒枝况此君子心雖無萬竿玉庶比雙南金天風有時來鸞鳳相和吟外直秉堅操中虛含素襟何當煙雨夕夣遶湘江深送黄𤣥之京予也夙頴悟十五知論文結交皆老蒼稚爪攀修鱗𠖇心三十年㝷源頗知津探𤣥始有得服膺如獲珍誓將覺後生庶以酬先民干祿鏞水庠歲星七周循青衿二十徒達者唯黄聞三十為禮官制作多述因前年乞骸歸甘作隠逸倫業窮道豈遷操危氣愈伸持此欲有授二𤣥乃其人時登烏石山眺逺滄海濱逸興發猿嘯閒情投鳥羣既與簪紱疎頗同緇錫鄰朝遊必竟夕夜吟常達晨放曠宇宙間外視埃􅅽身匏斟日動爵劒舞風披巾醉來各鴟張揮洒如有神坐或藉青草倦應眠白雲大運迭盈虛人事常參辰詎知同心者胡為遽離分于時維孟冬膏車戒征輪借問子何之囊書上成均執手念門友登堂辭老親驅馬西郭門祖帳螺江漘朔風捲行斾木脫波粼粼請為壯士吟庶以攄中懃丈夫志四海况乃觀國賓惜别語刺刺無乃兒女仁壯懐何以贈臨期解青蘋終南積翠終南太古色積翠無冬春陽厓俯荆楚陰壑開函秦碧樹曉未分蒼蒼散參辰下蟠蟄水龍上有避世人有時浮爽氣拄笏可攬結安得搆精廬談經對松雪屴崱朝曦天地有神氣屴崱東南青髙標窮碧落連峰走滄溟深探地無際逺見日初出蜃氣乍蒼凉龍光猶恍惚始知至陽精明明含中虛沿旋綴陰魄斡運乾坤樞願言吸晞景庶以永年歲手把扶桑枝身騎六鰲背兹焉對畫圖飛夣遶屴崱一笑天雞鳴晴窗已東白贈彈琴黄生髙館敞秋夕而多修竹林讀書有時閒游心復鳴琴露月稍低樹清風遂彌襟特兹保貞素庶以忘華簪溪南小隠夙性尚幽素卜此林泉居雖無珪組榮而有山水娛靜言一室中撫已常澹如窗間有鳴琴几上惟素書芳晨得朋簪清樽與之俱憩木愛佳鳥臨川羨游魚棲神縱八表誰言形迹拘惟願榮啓期斯樂同只且琴所詩伊昔大舜氏作琴歌南薫五絃具中和如彼天地仁姬文洎姬武繼作更述因云何去聖逺疇能㑹其真初聞新安郡追古有先民翕然大音奏澆風反其淳人亡餘故丘末路多荆榛所欣文獻存繼志無緇磷髙才何巍巍仰止惟徳鄰師襄如可作千祀猶同倫寄龍大潛效韋體夙負偃蹇志共懐林下心誰言塵事縻以兹曠幽尋夏火方云始索居念朋簪薄携一樽酒命駕來城南湛湛晨河流依依嘉樹林晤言有時閒揮觴共鳴琴久要或可冀希哲信難任君懐諒不乖惠我瑶華音送黄秀才歸西鏞外貎苦物役中心貴所知如何千里别値此清秋時驅車弔古臺暢飲黄金巵疾風海上來黄葉四散飛鴻鴈呌蘆渚螵蛸絓桑枝感候意方戚送逺神乃馳離隔勿復道久要長若斯題龍川書隠世業本淮甸幽居枕龍川𠖇心謝珪組秉志師聖賢耕鑿有餘閒軒窗富芸編夜雨雜春誦薫風清夏絃湯湯伊洛流澹澹洙泗淵㑹趣洞精要探􅄨窮幽𤣥求志業已崇行義理則然希君保貞素逍遥以永年富春釣臺維舟富春渚舒嘯登崔嵬不見羊裘人空餘埀釣臺苔色石上古秋聲松際哀清風猶可仰落日滿蒿萊哭陳憲使刈蘭無餘芳燬璧一成塵漢法密如網清波無修鱗陳人有媯裔秀出吳江濱曰惟洪武初奉檄始來閩感彼古哲人結交亦有因芝蘭既同臭膠漆情愈親時從登髙丘懐古共酸辛栖栖天地間不得一日春浩氣久欝結吐為五色雲遂使鬼神妬坐此終殞身才髙名不揚道存志不伸生為衆士憐死為萬鬼鄰汝母既已老汝妻乃初嬪汝魂歸無家汝子歸貰墳兄弟既徂逺朋友久且貧九原深無窮彼蒼髙不聞䘖哀欲有訴吞聲難具陳千齡萬祀後有懐在斯文夜酌邑庠留别髙梧絓朗月密竹深寒煙虛堂敞清夜桂酌開華筵論心機暫忘念别情已懸値此羣動息始知詩境𤣥行當泛蒼波去矣阻山川落葉擁戍壘飛霜清海天鴻燕有時還傾盖知何年願持松柏操永與金石堅同周孝廉夜宿郡庠有述乞身共棲遲聚首殊契濶子卧清溪雲予弄滄海月人生駒隙耳歲月坐超忽欣兹一樽酒信此百憂輟晤言不知疲髙歌清夜發久要諒無違保已終華髮留别諸彦秋堂閟虛寒晚竹引深翠暝然孤燈坐興與一壺對天冷霜滿襟露飲月窺醉曲盡别意深相看發長喟精岩寺香刹象天界名僧辭世氛一峯獨凌削衆壑相氤氲作禮向金仙宴林投鶴羣山犬䘖人衣却走避腥葷於時春向暮林亭藹餘曛蒼然草木氣盡濕西江雲登閣見千里𦕈懐滄海濆山鐘忽播蕩應此悟音聞訪陸隠君不遇結屋依兩崖疑是秦人家不見山中人風落青松花掃石調素絃尋泉飯胡麻願因玉麒麟緘書投紫霞經延平津昔人雙寳劍經此化神物晉室已寥寥劍光猶未没紅纒斗牛氣黒漾蛟龍窟千里一寒流馳波向溟渤𤣥化窅莫測沴氣閉復開有時潭水止白日飛雲雷伊余探靈異狂歌負竒懐回船向明月浩蕩秋風盃别龍秀才龍生不覊者愛士能開襟每醉玉壺酒復為梁甫吟訪余鏞水陽又將歸故林秋風樽前别落日川上心四郊已蕭條千里無飛禽離思苦難說望逺猶登臨同王六博士􅀫煙霞觀昔人煉金鼎此地餘還丹至今風篁鳴猶疑下笙鸞出嶺訪靈異投山􅀫天壇一片月色古千秋松影寒醴泉為我酒丹霞為我飱都無世人夣但佇風中翰夫子茍有意相期此投冠到家興未已更取吾琴彈游玉華洞真仙構靈宅洞府何嵌空入洞可十里流水咽其中陰島濕花露石門度松風怪石變萬狀尋源竟無窮有時起雲霧㣲徑又不通觸目極杳靄游心但鴻濛路盡忽有天容光澹空青蛻出風露外了然心目醒幽興殊未已又還􅀫雲扃飛夣即蓬島𠖇心祈道經終悲向朝市塵鬢秋星星翠簾山天湖翠簾髙凌天峰麓曠且平何年此蟠龍遂成秋水泓呼吸納元氣溟濛變陰晴雲雷地中起日月波上生上有空僧巢岩栖煉神形寥寥水月觀洞見心胷明我昔凌天梯恍若登赤城浮杯動松影發笑回天聲從兹便髙舉永極雲霞情同王六入西山尋白雲僧秋山晚蒼蒼引興白雲際方聞出谷鐘未返沿源騎躋攀霽心目始到三摩地苔色陰際寒松聲靜中細空僧此岩棲心寂跡如寄經誦有時閒了了見山翠抱琴者誰子夙性貪幽致雲卧復何為冰絃冩秋意西峰倐含景石榻又假寐身寄孤鶴巢夣如幽蘭氣夜分氣候白隠隠月初至陽磵澹空明陰林破深邃久懐緇錫鄰頗與雲山契章甫如可投期君訪靈異訪𤣥章師不遇真僧駐錫處雲床在西峰應物無所住安知來去蹤今來結青謡又向何山逢白日無經聲金飇但鳴松懸思永今夕杳靄秋天鐘秋夜憶周模傾盖一分手沉思長在襟况兹離居夕復此秋城砧露下葉初落草根蟲又吟雖云感物候終念曠幽尋劒水東南流故人千里心無因達尺素夣遶青楓林道中偶詠林館夕暫休星駕曉仍發沉沉樹若煙浩浩溪如雪白首倦長途青山笑予拙秋夜期盧道士見􅀫不至掃石待瑶駕焚香立陰階如何道機熟反使音期乖暝色帶疎竹秋聲連夜齋無因問丹訣黙黙此時懐宿黄梅五祖寺佛祖說法處迥與諸天鄰珠宫厯浩刼桂殿餘真身登攀訪靈異禮謁知宿因地逺泉石怪人閒猿鳥馴松杉覆窗戸濕竹清衣巾花雨出深夜天香來暮春久知簪組妄思與緇錫親所希慧燈影為余照迷津遊海上瑞岩海國横秀色兹山何欝盤黄金亘樓觀積翠開峰巒登髙恍神遊駐目窮遐觀地迥雲物古天秋松桂寒於時灝氣清東溟淨液瀾精思落天外回飈生羽翰嘗聞有靈草可以駐頽顔且畢濟時畧金梯期再扳石竹山紫雲洞羣峰際東海一峰凌紫雲昔人煉丹處石室莓苔紋飄飄龍虎車即此上丹闕惟留白鶴影宛在青松月下有靜者廬其人頗淳龎一水落天鏡萬花明石窗藥食有時暇還來叩岩關心與魚鳥樂身随天地閒伊余困流俗十載未應還長歌賦招隠夣遶天涯山題徐濆湘潭離思圖荆南不堪别孤棹向何處人分鴻鴈秋樹帶瀟湘雨離思亘重襟登髙但凝佇送吳士顯吳生鴈蕩人脫畧當世事欲識平生心悠悠江海是布衣何飄飄孤劒千里至斗酒未及歡看雲起歸思長風吹古城寒石下秋水分手從此辭車塵望中起酬外兄林大見寄衰孱謝時耀索居久荒蕪顧兹升斗祿遂與田園疎文墨互紛糺舍館若僧居齋中無餘物草木盈前除緬懐桑梓遥况與親愛迂舉頭望飛雲清興與之俱飄飄西南風翼彼五雲書豈惟比兼金欲貺無瓊琚撫運感離間䘖哀念先廬泉臺未及封舊業應翳如失路已窘步孤生歎多虞仰慚南枝禽俯愧同隊魚沉憂髪已種撫事心已痡裁詩重於邑安得膏吾車飲馬長城窟嬴秦亂天紀紫塞徒經營千秋扶蘇血脉脉流泉聲吾聞渥洼龍中天應房星所以千里駒翩然來漢庭題江上琴興太樸本無事大聽元希聲何如伯牙子尚懐山水情我有太古調欲托絲桐鳴人間正寂寞毋使蛟龍驚同鄭二宣江上泛舟載酒入江邑酒多江正長酣來散予纓濯向春流香東壁過疎雨西崦殘夕陽猿禽相嘯呌雲水共清蒼夕景更汎覽客程殊未央魚風葦上起蚌月波中光嘗以事泮奐永期名迹忘乘槎予豈必聊復咏滄浪今日良宴㑹今日良宴㑹歡娛在須臾念我平生友日夕萬里途廣筵羅雕饌酣歌鳴玉壺對之豈不樂相見生嗟吁勲業茍未樹綢繆將焉如江閣秋雲圖山容初歛夕雲氣已歸壑何以散冲襟孤琴坐江閣美人期不來天寒楓葉落邯鄲行玉貎邯鄲女少小來深宫春芳羞百媚秋水明芙蓉君王一愛惜白日生春風春風不長好妾顔豈長保一作玉階别衷腸向誰道憶昔少年夣不向邯鄲飛今日還思君時時望金扉雖作泉下土悽悽何所依門有車馬客門有車馬客徒侣何輝煌銀鞍耀白雪寳劍明秋霜借問客從來謝官歸故鄉且言昔别君君年正春芳聞言謁天子聲價靄玉堂龍顔霽霄漢虎變鏖文場寧知一失意白日沉夜光秋鬢非舊絲映㡌多星霜區區附驥尾薄宦歲月長觧組且歸去投君叙温凉嗟我聞客言慚愧獨彷徨大鵬反鎩羽燕雀終翺翔扼腕勿復道長歌臨碧湘題張少府夣澤髙秋圖夣遊秋水碧醉眺晚山閒短棹發吟思酣歌放狂瀾浮雲秋際來藹然芳樹間青蒼太古意天地同瀰漫荆門正西上樹古生早寒漢水日東逝冶遊多苦顔鴈思落芳渚漁情寄清灣願期同心人結屋江上山泉石清逸久為泉石人了與世塵絶朝飱清磵霞夜弄碧蘿月掃石奏吾琴尋泉飯胡麻長謡古苔篇似是仙人家陶令歸栗里安石棲東山心將槁木灰跡與浮雲閒有時窮躋攀落日更吟眺碧草藉醉眠𤣥猿引長嘯𠖇棲笑流俗何用寰中名千秋放意氣永極雲霞情題秋江漁釣圖移舟向潭石投釣臨寒流餘懐本澹蕩况此滄江秋白日既濯濯清飈何瀏瀏適意非在魚所希與神遊悠哉共恬淡惟應沙際鷗雲林清隠夙性抱髙致端居厭華簪尋泉鑿石壁結宇依雲林經鋤有時閒班荆坐檉陰清飈引長嘯白雲勸孤斟處黙謝流俗任真曠冲襟惟應同調者聽我丘中琴海天跨鶴滄溟控東極滉漾寛扶桑飄飄鶴上仙馭氣以翺翔碧落為我盖丹霞為我裳放神逐九有吸氣調三光驂鸞笑嬴陋策駿嗟穆荒逍遥大羅天歸來良未央玉泉良玉本温栗流泉尚清泚磨礱制器用疏鑿達源委偉哉瑚璉姿可以薦明水願言崇徳輝永矣喻君子贈劉子服兼呈菊老杯酒見交情㣲言發天機寥寥江海間荒途乃相知擊筑對修竹酣歌當古池乘桴昔何歎獻策亦應遲如何魯連子功成無是非送劉子服兼寄建溪諸知已路歧一為别壯心將奈何雲山寄逺迹歲月空蹉跎緬懐建溪客離憂空沉痾孤松偃磵壑荆棘結岩阿巴唱銷白雪秦箏妬雲和遂令懐古調感歎一狂歌鹿門自耕作東山卧雲蘿褰裳擷芳芷投竿餌清波浮雲自東來青天鬱嵯峨明月遥古意芳樽恣吟哦雖云念白首終歲守蓬窩夏夜金溪泛舟落日溪上昏登舟泛中流凉飇動林杪天際行雲收月色望不極水天共悠悠叩舷發清聲谷響如唱酬濯纓懐孺子洗耳思巢由誰能逝羊腸感歎生百憂明日期角巾登髙恣追遊海門秋望雲崖聳髙寒攀躋覽溟海試拂龍唇琴餘音散蒼靄月揺波影中葉度秋聲外矯首蓬萊宫仙人笑相待滄海雲帆圖朝暾出海嶠漠漠蒼靄分仙人駕舟楫乘風馭長雲飄颻紫霞珮追逐丹鳳羣晤言瑶池宴將以謁明君䕫龍接前踵奎章落雄文望之不可極海色空氤氲贈醫者採藥入雲林賣藥來城市肘後多蓄書壺中可藏世三葉即𤣥功一視惟博施今古孰與倫良哉宋清氏齋中曉起颺颺城鴉散鼕鼕戍鼓絶空庭寂無人衣上有殘月清池盥潄罷髙韻風中發爽氣山前來吾襟抱冰雪遊武夷九曲秋風泛瑶棹愛此佳山川九曲泝流月數峰標暝煙開闢自天地飛昇有真仙石上蛻金骨雲中鳴夜絃伊余探古迹得復窮幽𤣥閒招木客飲醉向天壇眠不見紫陽翁徒歌白雲篇余懐在漁釣即此應忘筌夏日登宿雲臺有述寄霜月上人投簪返初服躡屐謝紛擾永言卧丘壑庶以狎魚鳥兹臺夙所憩磴石出煙篠况逢朋簪盍燠景共臨眺前瞻極空濶下瞰洞深窅地古雲木殘天長海山小真僧此㝠棲宴坐閱昏曉喻心青蓮凈說法天花繞願聞㣲妙音意泯萬縁了豈必東林人相逢可同調九仙山樓觀仙山有樓觀虛爽軼浮埃昔日九仙人跨鯉兹山來赤鯉去不返仙人安在哉空餘彈碁處白石生蒼苔至今羽人居往往聞風雷檄雨古壇暝禮星寒殿開常聞至人言内景融春臺羣生若芻狗大道如嬰孩飇車與天接豈但登蓬萊登清泠臺吟秋􅀫絓月際曉登清泠揮手援碧蘿騰身棲翠屏長風吹雨來不見羣山青鳥度白雲濕龍歸滄海腥真僧此岩棲觀空靜襟靈竹塢見曝衣花臺聞演經沃以甘露言迷途醉而醒願言割兹愛永也投禪扃同諸生登絓月蘭若金人青蓮宇乃在白雲裏久與名僧期乘閒却來此入門聞經梵絓壁見巾履落磵泉影紅侵廊蘚花紫海天正南豁一望見千里獨樹川上浮孤煙島邊起予生况多暇所性樂山水真賞非外求𠖇心巢居子題任生水南山房新安山水郡昔賢籩豆鄉志士應昌運幽人潛葆光青𠖇南山逺綠縟春溪長世外鑿霞壁雲中開草堂經鋤有時閒方舟復鳴榔鳥度鏡天凈人閒潭水凉尚想鹿門隠猶思愚谷藏珪組茍無心禽魚亦相忘伊予懐故林碧蘿盤石床因君賦招隠鼓枻歌滄浪題異上人挂月軒迢迢青蓮宇寂寂野僧定片月挂虛空羣厓破陰暝雲窗晃玉毫露幔捲金鏡色映天影寒光凝古潭凈常聞止水觀可以喻禪性夜久悟音聞空山響煙磬夏日遊幻住蘭若青山古城曲溪水相縈紆尋山避燠景喜得金仙居水石翳洞古松蘿覆窗虛俯見蘚痕積遥知人跡疎願以青蓮界永期紛垢除流咏發天籟洗心清道書遲遲至棲鳥望月歸吾廬夜􅀫郡齋水亭呈林八博士孤琴水亭夕客至罷鳴彈况有樽中醪斟之罄情懽濯足向清泚披襟散塵煩仰見海上月兼之天籟寒齋舍何蕭條蓬門若丘樊深竹讀書處百蟲鳴夜殘予懐良已舒為君咏幽蘭鳴盛集巻一
