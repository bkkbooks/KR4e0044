body:
  text: 鳴盛集别集類五明提要臣等謹案鳴盛集四卷明林鴻撰鴻字子羽福清人洪武初以薦授將樂縣訓導厯官禮部精膳司員外郎年未四十自免歸事迹具明史文苑傳明初閩中善詩者有長樂陳亮髙廷禮閩縣王恭唐泰鄭定王褒周元永福王稱侯官黃元而鴻為之冠號十才子其論詩惟主唐音所作以格調勝是為晉安詩派之祖李東陽懷麓堂詩話曰林子羽鳴盛集専學唐袁凱在野集専學杜蓋能極力摹擬不但字面句法併其題目亦效之開卷驟視宛若舊本然細味之求其流出肺腑卓爾自立者指不䏻一再屈也是在宏正之間已有異議周亮工書影曰閩中才雋輩出彬彬風雅亦云盛矣第晉安一派流傳未已守林儀部髙典籍之論若金科玉條凜不敢犯動為七律如出一手云云是其末流且馴至為世口實然鴻倡始之時固未嘗不舂容諧雅自協正聲未可以作法於凉遽相詆斥况髙柄尚不免庸音鴻則時饒清韻尤未可不分甲乙一例擯排矣此本為成化初鴻郡人溫州知府邵銅所編未有銅跋稱覽其舊稿慨然興思因詳加校勘補其缺略然如張紅橋唱和詩詞事之有無不可知即才人放佚容或有之决無存諸本集之理此必銅托小說妄增之夢遊仙記一首疑亦寓言紅橋之事觀其名目乃襲元稹夢遊春詩可以意㑹銅亦附之簡末殊為無識葉盛水東日記載銅天順中為御史以言事忤權姦左遷知縣則其人亦錚錚者或平生以氣節自勵文章體例非所素嫻歟乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀鳴盛集原序元氣行乎宇宙間膚而直者為人其清淑者為明哲為英豪性之為道德發而為詞章至於聲詩又詞章之清淑而最者也吾友林鴻子羽早頴悟獵涉羣書提要鉤𤣥去其糟粕而掇其英華悉取資以為詩自盛唐以上厯晉魏漢氏十九首楚辭三百篇皆沈浸醲郁一日援筆而賦動數十什洋洋大篇溶溶短章皆新竒俊逸馳騁若騏驥浩蕩若波濤清絶若雪山冰崖皎潔若瓊琚玉佩擇其尤者置之韋栁王孟間未易區别臨川王先生郁一見而異之曰此大厯才子復見於今矣且天性倜儻樂山水好翺翔率嘗與豫登道山清泠臺薛老峰泉石膏育風雲氣槩故其詩邁俗軼塵良有以也今年冬與豫相㑹太和宫因出所製一編而求序豫辭不獲故秉翰而題其首雖然以吾子之才之美進進未可量也若登泰岱之峰愈髙愈低將小天下矣則桓雖謭材又將執筆從而序君之别藁尚未晚也洪武三年冬吳興倪桓序詩家者流肇於康衢之擊壤虞廷之賡歌繼是者渢渢乎三百篇之音流而為離騷𣲖而為漢魏正音洋洋乎盈耳矣六代以還尚綺藻之習失淳和之氣唐興陳子昂氏作障厥狂瀾杜審言宋之問沈佺期李嶠又從而歎之至開元天寶間有若李白杜甫常建儲光羲孟浩然王維李頎岑參髙適薛據崔皓諸君子各鳴其所長於是氣韻聲律粲然大備及列而為大厯降而為晚唐愈變而愈下逮夫宋則不足徴矣元有范虞楊揭趙數家頗踵唐人之轍至於興象則不逮焉噫文與時遷氣隨運復不有作者孰能與之今觀林員外子羽詩始窺陳拾遺之閫奧而駸駸乎開元之盛風若殷磻所論神來氣來情來者莫不兼備雖其天資卓絶心㑹神融然亦國家氣運之盛馴致然也謹題其集曰鳴盛為之序云洪武庚申季春既望嘉議大夫禮部侍郎權吏部尚書廬陵劉嵩子髙序
