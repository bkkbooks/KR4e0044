body:
  text: 鳴盛集後序膳部員外郎子羽林先生吾閩善賦者之巨擘也國朝詩派起於先生當時若鄭孟宣黃玄之周又玄髙廷禮林伯璟漢孟輩號稱十才子皆出於其門嗣是流於王皆山及中美孟揚陳仲完鄭公啓張友謙趙景哲諸公繩繩繼繼尤不乏人是皆先生殘膏賸馥沾溉後來者益多矣惜乎其詩集所存者遺編斷簡字多魯魚亥豕之失為可恨耳余自出守東甌每於聽政之暇覽其舊稿慨然興思因詳加校勘補其闕略繕寫成編乃捐己俸召工鋟梓以傳嗟夫詩豈易言哉五常之精萬象之靈不能自形於言必委精萃靈於英偉奇傑之士以煥發焉刪定而下楚人之騷漢晉之選唐之李杜韋栁宋之歐梅蘇黃元之范楊虞揭真萬世之衡軸也逮至於今作者愈盛觀先生之詩知先生之所蓄富矣其吐辭流麗春日煦而百卉鬭姸也造語清奇秋雨霽而羣峰壁立也氣焰鋪張武庫宏開而劍戟光芒也句法豪蕩洪濤洶湧而魚龍出沒也融情於景物之中托思於風雲之表寓意命辭兼得其妙讀之使人感發而興起非偉傑之士其能致然與豫同郡人也藐焉晚出不及見先生之儀容而親炙之獨賴斯集之存諷詠撫摩庶幾可以私淑而倣佛其一二也謹述先生詩學相傳之懿僭書於末簡云時成化三年丁亥五月蒲節賜進士出身中憲大夫浙江溫州府知府邵銅序
