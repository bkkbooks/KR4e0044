  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0044_WYG_005-1a, image: WYG1231/WYG1231-0080c.png}
body:
  text: 賦椰子賦余嘗駕蒼虬乘虛舟登蓬萊之三山遊海外之四州思金莖之玉露沁枯腸而消憂有一黎叟怡然謂豫曰遐荒之遊樂乎吾遺子以消渴之物形碨礧而味珍羞名為椰子欲之易求乃翩翩而特立聳喬樹於荒丘孤高挺出劒葉蓊鬱標危幹而參天揭金莖之崒嵂厯四序而不雕飽風煙而秀實若乃瘴海春霽蠻溪秋晴暖氣新煦炎風不蒸膏雨方潤涼露乍零初蓓蕾而凝苞漸纍埀而懸罌及夫鐡殼將堅匪方匪稜猶混沌之未判疑殼漏之乍盈繄風氣之所産乃渾然而天成至於長梯摘鮮玉盤薦美霜刃剖箕山之剛瓢紫胞露雲英之玉髓裂瓊肌之纎紛璺甘露其下釃啖盈几之春冰掬一泓之清泚啜山茗而細嚼覺餘香而繞齒至若炎景流金隆暑若熬體欲倦而少休汗承并而沾髦可以當乎醴泉可以比於松醪快煩襟之一滌勝涼州之葡萄張公大谷之梨不足以喻其味梁侯烏椑之柿不足以並其膏其為鄰也則有羅浮之丹荔其同類也惟讓尚方之胡桃維知遐壤之異品尤邁中州之佳肴類方物而入貢堪與橘柚而同包叟言已而告去倣兀然而禪逃余曰昔者成周不貴異物服食器用土貢無失珍禽竒獸是獻俱絶所寶惟賢遐邇盡悅矧兹微物筐篚敢匹叟謝不敏其容有怩棄豫欲辭疾而趨出檳榔賦世有異物産於炎方既堅且實名曰檳榔挺根株之特達抽枝幹之芬芳披煙雲於海島霑雨露於遐荒體團圓而如玉質文采而有章落氷刀之雪白起柔殼之丹黃味兼灰蔞之美液凝齒頰之香豈中華之所尚實南海而見嘗乃椰子之是類與豆蔻而同鄉其生也匪桃李之礧磈其熟也若橘柚之焜煌嚼之則吐紅而點地吞之則流汗而成漿無琳無琅非璧非璋花先月桂葉似桄榔狼蠻以之而為至禮珠崖以之而為至良至若瘴煙乍斂海天微涼雕題黑齒蛋髻黎裳莫不奔走興販摘曝盈倉或肩挑而背負或舟載而車裝於以定婚禮於以先酒觴於以獻賓客於以充廟堂是皆風土之誇羡日日喜啖而不可忘也乃拜手稽首復為之歌曰瓊山髙兮如屏瓊海流兮有聲檳榔生兮滿林妙結實兮為祥為禎再歌曰瓊山青兮峩峩瓊海流兮波波檳榔生兮孔多為禎為祥兮千秋不磨
