中此意謾勞題尺牘都門雪後有歸鴻送髙書記之邊青袍書記去翩翩紫塞從戎不記年磧裏倚弓看漢月雪中走馬入氷天烏孫部落通烟火勑勒沙場乏水泉聞道安西無戰鬭時時醉向酒家眠春日寶峰蘭若游集得房字化城鐘動曙蒼蒼野服乘春到上方一犬卧園芳草暖亂禽啼樹石楠香珠林對酒朋簮盍寶地看花色相忘欲向寰中除苦惱無過依止贊公房遊秦川龜湖寺風動松門野殿荒老僧相見謾焚香身隨斷梗棲卑邑跡比閒雲到上方葉落空林行處滿心超諸品坐來忘清泠久别烟霞侶想是青苔長石床寄髙逸人君家别墅抗浮塵曽共浮丘醉度春花落更聞啼寺鳥栁深或見渡江人生涯不定如蓬斷㑹晤無期望月頻明日扁舟東海去幽居欲與孟家鄰送人入蜀把酒長歌蜀道行髙堂千里見君情微霜半落青楓樹曙月平臨白帝城挂席不離江鴈影沾衣多向峽猿聲錦城莫道無知已何限居人識馬卿李將軍席上賦清逺樓城上危樓駕逺空䦨干長憑五雲紅幨帷曉駐山河影鼓角秋悲草木風列宿南垂珠斗近衆流東去劒川雄于今百粵無傳警好把金尊送落鴻閩關春晚圖送司倉之京江上離筵惜解攜閩關北上亂山迷花深野戍嘶疲馬月隱關墻聽曙雞劒佩朝天雙闕迥家林近日片雲低京華故舊如相問白鴈音書醉懶題秋江别思圖無諸城下送行舟滿座詩人賦逺遊歸夢不離秦苑夕客程多在越鄉秋江楓葉落填沙岸塞鴈聲寒到驛樓會見使君簮冕貴未應華髮老滄洲初出同黃少府宿采石南宮拜疏許歸休蘆荻滄江晚繫舟貫酒暫同牛渚咏曳裾無復鳳臺遊海門白湧潮頭急烟島紅拖雨腳收不用臨流濯纓袂此心從此不驚鷗新秋浮亭夜集海國新凉一鴈來衣冠髙㑹壯懷開浮亭夜月樽前滿古樹秋聲笛裏哀白髮朋遊嗟落魄青山故業怨低摧燈殘酒醒還成別刻漏應愁曉箭催九日登絓月蘭若憶鄭二宣微霜初下越王城衰病逢秋也自輕九日登臨多縱醉百年感慨獨鍾情斷蟬野寺黃花晚逺樹江天白鴈晴却憶浮丘炎海上懶題詩句寄同聲寄髙逸人獨倚城南百尺䦨粵鄉秋思浩漫漫平臺樹色催殘照近郭砧聲報早寒雲物正當搖落後關河終念別離難龍門別墅今宵月誰與相同把酒看送楊孝廉之京刺桐花發荔初垂海國逢君話別離日下共𫝊優對策天邊相送醉題詩石城古樹秋風早淮水孤帆夕鳥遲君有長才如賈誼追趨好向鳳凰池浮亭風雨夜集憶鄭二宣天涯此別意何窮一片愁心萬里同明鏡曉霜驚白髮浮亭秋雨夢青楓書回絶島孤帆逺門掩寒塘舊業空說著登臨多感慨一緘封淚寄南鴻過東林雙澗有懷舊遊曽於此地盍朋簮嵗晏重來百感深門掩薄寒初暝雪樹含輕靄欲棲禽滄波涉海驚魂夢白髮看山倦嘯吟聞說逺公能館我便投章甫卧東林冬夜與髙五秀才館林八員外宅逺别悠悠歎二難多君留飲故情歡生涯秖合尊前醉功業無勞鏡裏看落葉走階風動晚古梅臨水月侵寒何因得似龍門叟野艇終身一釣竿與陳八參軍夜飲話舊鄉園别後隔烽烟此夕論交意惘然鴈引歸心離海國杯銜好月醉霜天謀生自愧青雲後話舊多驚白髮前明日豫愁分手去憑君慷慨看龍泉寄周一秀才𤣥兼呈陳八處士炫薜老峰前夜詠詩若為離别思凄其忝於詞客推前輩久約林僧恐後期澤國未霜楓落早山城上月鳥歸遲自慚淺薄非徐稚賴有陳蕃是故知海口道上有述懷鄭二宣露下菰蒲有鴈聲曉驂初發宿寒輕新知乍别孤吟倦舊國重來百感生黃葉閉門逢野寺白波侵郭見江城家林暫别堪惆悵翻憶浮丘海上行將歸冶城留别陳八炫林六敏南宮歸後嵗蹉跎此日逢君奈别何野館解鞍行客飯寒山對酒故人歌蒹葭水國孤鴻度橘柚霜林匹馬過為報已無軒冕夢清泠臺下卧烟蘿與黃一秀才輩雨夜浮亭集宴憶鄭二宣香炧燈殘意萬重與君共憶逺遊蹤尺書不到驚春鴈樽酒相逢話夜鐘風動櫟枝翻暗鵲雨深莎井響鳴蛩自慚淺薄誰招隱尚掩丘樊學卧龍陳八參軍露飲梅天雪霽時不堪南望思凄其五勞有病仍耽酒七步何才敢咏詩岐路分攜愁落葉家林歡㑹憶連枝自慚放逐歸來晚那得鳴鑣到鳳池憶龍門髙逸人浮亭露飲玉樽空千里心期此夕同海路想經春草緑越吟愁對夜燈紅他山花發鶯啼後别墅春歸積雨中聖代祇今無隱逸不應多病卧孤蓬寄林一和雨館張燈坐夜深故人相對醉成吟二毛易老慚看鏡四美難并愧盍簮澤國曉霜催候鴈縣城春樹變鳴禽賈生尚有長沙謫此日無勞歎陸沈送趙生之京青門樹色引鳴騶一曲驪歌送逺遊慷慨自知非怨别關河終念對窮愁雲邊夜犬鳴沙驛海上寒山出郡樓到日都門春水緑珊珊飛珮上瀛洲憶鄭二宣時往交州旬日隂霖結不開窮居幽草亂侵階也知白髮緣愁長無那青山與願乖行阻看花攜濁酒卧聞啼鳥閉虛齊比來况與浮丘别一望南天一愴懷畢公房躋閣攀岩入化城薜蘿髙卧寄閒情孤窗上月分燈影亂葉隨風雜磬聲麋鹿自知諧野性簮圭何用絆虛名真僧出世心無事戒得氷壺徹底清謫居寄冶城同志逺别悠悠泣路岐丹心雖在鬢毛衰阮籍猖狂緣世難叔牙感慨為心知春城久判花前醉野館無由雪後期自愧不如閒草木也承雨露沐恩私宋中送魏萬之安西梁苑微霜梨葉紅行人此日發關東酒邊怨别看長劒馬上驚心見斷蓬雲散嶽蓮開泰華月寒郊樹隱新豐窮秋亦有臨邊使待爾題詩寄塞鴻送浦大歸晉陵分得衣字離亭征騎曉騑騑正值關河朔鴈飛白髮相看閩海别青山遙送晉陵歸江城雨外蓮峰出野寺霜前柿葉稀自愧忘情非上知臨歧唯有一沾衣寄髙八逸人離亭髙唱久難酬明月心期戀舊遊泛臘酒香頻中聖流年花發總關愁山園浥露寒梨熟水國迎霜晚稻收自愧湮沈向城市閒情惟有一登樓送宮人入道二首溫泉宮裏洗鉛華共訝君恩許出家阿監别時留佩玦道流迎處指烟霞乍拋月殿吹簫譜學煉星壇伏火砂幾度春風緱嶺上步虛閒繞碧桃花其二大家有㫖許求仙便著霓衣下九天碧落早知騎鶴路青春悔度種花年已教水月澄心鏡無復香雲綰鬢蟬昨日麻姑來問信又言滄海變成田挽紅橋柔腸百結淚懸河瘞玉埋香可奈何明月也知留珮玦曉峰長想畫青蛾仙魂已逐梨園夢人世空傳薤露歌自是忘情惟上知此生長抱怨情多登嶽陽樓湖水平臨䕫子國嶽陽絶勝濯龍宮樓臺迥出丹霄上島嶼浮來玉鏡中墨客琴樽渾醉月榜人舟楫若乘空青蘋風起還能賦不獨蘭臺宋玉工江上送王悅歸關中秋風吹冷薜蘿衣客裏逢君賦式微楚水别來浮桂櫂秦川歸去掩柴扉中天華嶽三峯削獨樹關河一葉飛我有愁心如斷鴈隨君征路向斜暉送朗上人歸匡廬浮杯渡海寄行蹤歸去匡廬若箇峰月滿空山行迹遍心通萬法看經慵蘿深自識雲中寺秋晚遙尋澗底鐘共有東林蓮社約寒流石上幾時逢將之三華留别冶城知已躑躅花開黃鳥吟春城送别栁隂隂故人共灑臨岐淚逐客空懸戀闕心白髮流年嗟落魄青山歸夢憶登臨金溪此去多乘興不似看花醉故林賦得垂楊送客客路垂楊最有情暖風吹緑漸冥冥雨深煬帝宮前見月落桓伊笛裏聽葉暗乍堪藏乳燕花飛終恨化浮萍分攜欲折長條贈愁絶河橋酒幔青歸冶城辱群公追餞至江心亭梅風初熟布帆歸相送勞君到翠微逺樹啼鶯留客醉髙林深竹見僧稀江心絶島晴浮出雨外孤雲濕倦飛野鳥白鷗如有待想應知我拂朝衣送僧遊蜀蜀道岧嶤不易攀浮雲蹤跡去如閒畏途棧倚天邊樹舊寺門扄海上山暝猿峽裏焚香宿暮雪城中乞食還岐路送師多感慨朝簮未擲復何顔秋夜送王廣文還延平詩客飄颻劒上來玉壺清酒為君開梧桐一葉秋聲早河漢三星曉漏催滄海别來頻積夢青山歸去且銜杯蒼蠅未必能沾玉莫把丹心變死灰吳航送鄭二之海上百年相見幾悲歡久客移家欲别難海路雲山天際斷縣城春樹雨中寒已辭紫禁休魚佩未築丹丘愧鶡冠從此一杯分散後嘯臺明月共誰看留别髙八逸人野客行歌賦式微江亭埀栁鸊鵜飛久從别墅花前醉倦逐征鴻雨外歸極浦波光搖去棹晴川栁色滿行衣冶城亦有同遊侶髙唱于今似子稀天王寺烟蘿洞寒岩精舍石林東冉冉垂蘿洞穴空宴坐袈裟深杳靄仙遊環珮小崆峒紅泉雨過花皆落翠篠雲來月不通掃石焚香頻到此定逢秦世采芝翁夏日與諸公至絓月蘭若翠微精舍薜蘿垂澗戶隂隂暑不知青草舊遊苔滿院白蓮新社雨侵池題詩好是書蕉葉招隱誰同賦桂枝不向空門休物纍下方塵土欲何為秋江離思圖粵城衰栁拂金堤雨裏秋襟惜解攜客散江亭聞斷鴈酒醒沙館候鳴雞楓橋夜冷吳謳起笠澤天寒楚望迷天路雲山從此别一封愁札為君題寄髙逸人緑楊影裏勸離杯又見黃花故苑開載酒憶遊棲鶴寺懷人獨上釣龍臺雨昏别館疏鐘斷葉盡空江朔鴈來近得浮丘書信否渴心吟望欲生埃秋夜浦舍人見宿園亭分得天字南宮飲散動經年此㑹羈魂各黯然霄漢故人誰更在江潭逐客自堪憐踈燈細雨開秋宴落葉驚風攪夜眠歸去晉陵成逺别好憑陽鴈望南天寄王六博士西鏞城下舊迎逢兩地心期意萬重詞客青山題藻句逐臣滄海寄萍蹤忘情已覺看花懶多病真成對酒慵却憶西齊好明月相思吟送暮天鐘髙逸人見過園亭分得何字園亭鳥散掩垂蘿上客連鑣晚見過纓冕已捐身外事玉壺且向醉中歌鷹風入樹凋秋葉蚌月流雲度曉河今夕相逢須盡醉明朝分手奈君何送鄭二宣之交州一曲勞歌酒半醒嗟君此去泛滄溟論交自信心如石避地終悲跡類萍瘴海風濤行處白故山烟雨别來青冶城亦有同遊侶共向天涯憶聚星登絓月蘭若憶𤣥之秀才離懷觸景易消魂况復尋雲到法園晴雪閉門深竹暝夕陽鳴磬野藤昏林僧夜語多經梵詞客春遊少屐痕最憶𤣥暉羈璧水鳳臺新詠與誰論首春同周大登冲天臺有懷王六徹鄭二宣黃一𤣥林六敏雲物蒼凉拂曙開望春吟倚最髙臺烟和緑野宜歌鳥雪徹青林尚吐梅酒伴分攜龍劒去山人招隱鶴書來升沈榮辱何須問且縱芳樽坐石苔送陳秀才之京老逢烟景即關情况復窮秋别友生對酒自然堪灑淚臨流何必濯長纓帆開積水風初起路繞寒山雪乍晴璧水鳳麟如子少珊珊環佩早登瀛桃源清玩桃源勝邑少風塵吏散尋幽學隱淪紅雨亂飄仙洞曉緑雲深護誦堂春漆園夢蝶應前兆葉縣飛鳬定後身聞說使君多逸興問津何必武陵人夕陽抹野銜山影欲收光浮鴉背去悠悠髙城半落催鳴角逺浦初沈促繫舟幾處閨中關繡户何人江上倚朱樓凄凉獨有咸陽陌芳草相連萬古愁離雲飄葉卷得天字杳杳浮雲暝逺天蕭蕭霜葉拂離筵半空映日飄還散萬里隨風去復連髙擁片帆凝曉色長侵野徑入寒烟送君對此難為别無限傷心滿目前題瀟湘烟雨圖淋漓元氣楚天秋湘浦琅玕翠欲流粉節娟娟含雨長烟梢隱隱拂雲稠醉中卧聽寒聲逺吟裏看連暮色浮玉輦不知何處去蒼梧渺渺使人愁夏夜懷故人空齊不寐夜初分獨坐凄然憶故人山霧滿庭空翠濕石牀當戶月華新竹窗把酒知何日樵徑攜笻又幾春惟有别時芳草色閉門相對碧如茵南浦緑波溶溶漾漾際沙汀烟樹寒蕪祕逺青萬頃流光涵玉宇一帆爽氣動文星飛禽浴鷺翻晴色落蕊浮花送晚馨明日相思來别處徘徊照影悵伶仃汨羅懷古獨向芳辰上綵舟長天落日思悠悠千年詞賦名猶在一代英雄事已休每挹孤忠天地老空餘陳迹古今愁蒲樽更欲風前醉長笛數聲鳴逺洲緑隂啼鳥日上髙林宿雨晴緑隂深處一禽鳴落紅塵外偏多恨遠翠梢頭更有情繡倦玉窗聞處巧酒停芳席聽來輕繁絃急管空撩亂白髮梨園按未成溪山真樂何處名山淡碧滋一溪新緑動晴漪移居未傍龎公宅逺道空歌陶令詞鶯囀栁間春色淺鷗翻沙外夕陽遲囂塵何事難拋擲苦把閒身向俗縻弔黃祥欲見髙人不可期空堂素幕淚先垂游絲捲雨閒芳榭雜蔓侵階卧藥籬月冷秋波魂去逺雲霾春冢魄來遲芹邊閒却時懸榻無復清容見小池送天使蔣二回朝復命鞍馬迢迢入帝京共瞻使節出孤城帆分秋色南天晚人沐恩波北海傾奏對九重丹漢近逶迤萬里大鵬輕懸知朝罷從容日更述民風頌治平老卒還田里蚤從玉帳出邊關雪鬢垂絲喜得還鋭氣暗隨秋色盡老情翻樂故園閒戰場尚記歸時路村徑猶依舊日山留得少年長劒在壁間懸却獨頻看詠古墓何代凄凉土一丘蓬蒿馬鬛幾春秋斷碑無字埋青草古徑侵田繞碧流山鳥似啼依枳棘野烟如暝鎖松楸當年懸劒今何在空使來人起暮愁題淮甸歸耕圖回首吳天海嶠迂綵舟斜日過姑蘇劒歌聊復傳鸚鵡座客誰為唱鷓鴣錦樹連雲侵甸麥素潮湧月動檣烏固陵春色還應好聞道田園總未蕪寄蕭四上舍栁色千條過一春相思兩地正愁人乍辭簮組成飄泊甘向林泉學隱淪錦字不來勞曉夢玉琴無意染芳塵飛花日日隨流水好把金樽到手頻錦江春色天際雪消春水來融融春色錦江開洪濤洶湧翻晴日駭浪奔騰噴怒雷三月魚龍多變化百年舟楫幾傾催誰知大禹當年力惆悵臨風酹一杯月夜登臺髙臺突兀五雲頭風捲笙歌徹夜流玉兔初生銀漢影桂花先報廣寒秋夢飛弱水三千里興入仙家十二樓只恐酒醒滄海變笛聲孤起古今愁歌風臺漢祖龍飛竟不回巍巍臺榭倚天開霸圖寂寞終塵土王氣消沈向草萊無復故人同擊筑空如野客獨銜杯于今六合為家日颯颯悲風故樹隈送李通守歸鐔上二首攬轡咨詢出劒津飄飄錦服拂芳塵官亭貰酒逢詩客山徑尋梅問野人紫案鳴琴常對晚黃堂判筆每生春懸知歸去多餘暇好寫清吟為寄頻其二共看少府厯山城駐馬西鏞第幾程海嶠遙連閩嶠紫昭潭曽似劒潭清半簾月色供詩句一路梅花遣官情明日咨詢歸去後定將嘉績逹宸京寓秦淮寄冶城知己萍蹤無蒂數分攜海國羈魂易慘悽千里歸心逢臘盡亂山殘雪望鄉迷荒村落葉渾成雨極浦寒潮亦到溪遙想石橋梅發處何由縮地一攀躋秋江離别聽我離筵把酒吟我吟都是别情深鱸魚忽動三秋興海鶴空懸萬里心曉甸波光槐樹碧夕陽鴈影越山隂明時正好崇勳業底事年來喜擲簮秋日同諸公至洽師房洽公蘭若宿雲隂上客何頻此盍簪幔捲雲山邀逸興樓標霜月喻禪心空階雨過閒花發絶澗風來落葉深今夜上方期共宿一燈竹裏對君吟送惠師歸東山别業逺公飛鍚出人寰别築精藍俯碧灣啼鳥不離階下樹閒雲長護檻前山燈懸靜室觀身悟屐響空林送客還借問松醪何日熟㑹須乘月到禪關賈誼宅聞君放逐此淹留獻納空懸漢室憂舊宅獨臨湘水逺遺文曽弔屈原愁青楓極浦烟光晚白鳥空江樹影秋西望不堪懷古意欲因歸去卧滄洲雪峰寺微霜落葉度關河古寺清秋掩薜蘿輕策獨隨飛鳥去好山偏向夕陽過三花祇苑逢僧少獨樹空臺積雨多却憶朋簪耽勝事下方塵世易蹉跎江上書懷呈林八瑾昔年曽共醉蘭舟明月閒情憶舊遊獨客荒村空向暮異鄉多病厭逢秋殘烟野戍聞寒笛落日楓林見驛樓為報别來憔悴盡謾因尊酒更消憂山中即事少年書劒愧蹉跎舊業空山掩碧蘿看竹暫忘塵外事逢人多向雪中過乞歸故國青霄逺卧病閒門白髮多别去若尋林處士後時相望一髙歌懷友人陳三源浮雲聚散幾悲歡久客懷歸憶萬安門對西山朝氣爽城臨東海暮潮寒身隨斷鴈兼秋逺夢入踈砧向夜䦨為問松蘿舊遊處别來花月共誰看寄汪知己客身飄泊類浮萍塵世風波夢亦驚千里青山違故邑十年白髮戍邊城王門獻策今時寵孔徑看花舊日情魚鴈不辭雲海闊謾勞尺牘慰平生釣龍臺逐鹿屠龍事渺茫空臺依舊枕崇岡衣冠神禹傳苗裔風壤宗周列職方南粵雲來螺浦白東甌天接虎門蒼登臨送别兼懷古不惜狂吟倒玉觴詠得攀楊栁寄故人胡大東風吹緑正依依欲折長條愧别離蘇小門前人散後霸陵橋上燕來時飛花蕩漾隨征棹亂葉飄飄泛酒旗只恐化萍春又去好將一曲寄相思寄鄭二宣旅憩髙吟送曉鐘深懷野客寄行蹤南登逺道憑歸鴈舊隱空山憶卧龍蘿桂同心愁獨住鶯花異日興偏慵遙知别去多詞賦料得顛書也獨攻寄髙逸人千里懷君積夢中南宮侍從忝余同荒居懶病看花盡舊事驚心向酒空苑樹月來依宿鳥海天春去見飛鴻懸知相望無由逹此㑹令人意不窮酬王一𤣥諸友過訪故人問病到山村美酒香茶慰討論賈誼有才匡漢室梁鴻無策謁侯門江田未熟晴蕪長館樹新凉夕鳥喧暫得相逢須盡興醉來分散已黃昏壽胡逸人碧榕深處鎖烟霞銀燭華筵景物賖石室天香聞杜若玉缸春酒泛胡麻暫輸滄海心猶在久著青囊髮未華從此自緣方外趣不須勾漏問丹砂觀趙龍虎習兵聖代雄藩尚練兵將軍意氣重橫行登壇久論安邊計倚劒平臨近海城玉帳鳴笳通逺戍青絲歸騎出連營懸知漢主垂思慮始信票姚獨羡名夕陽孤棹梨葉青青春草齊南天相送夕陽低看雲海國同誰醉倚棹江亭又解攜畲米未收行客飲蠻烟初散曙鴉啼孤篷回首知何處莫動哀吟易慘悽懷浦舍人長源祖筵相送槿花時江上逢春感别離詞客登臨芳草變鄉山吟望尺書遲鶯聲吳苑行人度海色官船暝栁埀最憶玉門聽曙漏思君閒夜益悽其懷南宮趙大叔度悲歌對酒强成歡三十窮經尚考槃楚水逐臣空作賦淮隂年少獨登壇青山官舍踈鐘晚黃鳥蕪城暮雨寒料得西鏞多勝事凌霄明月憶同看送楊紫庭之京津亭送客栁隂隂把袂長歌念盍簮此去雲霄休恨别舊遊江海寄愁心挂帆淮月鄉山近策馬吳關驛路深明日知君相憶處鳳臺登眺與誰吟送王一之京楊栁青青春草齊官亭客散夕陽西歸心正逐孤帆去離思偏驚匹馬嘶雨歇聽鐘精舍近月明聞梵枕峰低那堪吟望空梁夢遙憶清芬滿劒溪送友之京翩翩驛騎拂青絲斗酒城隂醉莫辭别路逺從雲外去論文誰向雪中期寸心冉冉懷丹闕雙珮鏘鏘拜赤墀遙想朝回春更早好音還慰倚門思送池王二友歸劒鐔二首竹枝歌罷早潮平把酒離筵感别情年少常懷郗詵第才華獨羡馬卿名鐔津栁色迎歸棹螺渚鶯聲送客程良㑹未窮分散去好題飛札到岩扄其二卧病丘園感越吟對君離思忽驚心琴樽何意成寥落纓冕誰知尚陸沈滄海一身懸北望青山雙淚向南深須知夢裏還相憶風雨浮亭夜盍簮送賈文學之京秋風離思正依依匹馬西行向夕暉别路逺從霄漢去知君已覺少年稀淮邊落木南天盡江上寒雲北鴈飛鳳闕朝回春更好為題尺牘到岩扉賦得羅浮山送人之任陶令之官瘴海濆羅浮勝境昔曽聞飛來島嶼丹青合畫裏樓臺紫翠分曲澗花深常帶雨龍川水暖欲生雲别離已是春風後那得梅花折贈君浮亭夜集寄華故人南亭髙館薜蘿深此夜思君萬里心鄉國舊遊多怨别雲山何處獨登臨寒蕪落鴈天低樹野戍平沙燒隔林尊酒相逢還寄意也應知我一沾襟月夜㑹林南宮聞李生彈箏浮亭簮盍醉吟逢髙調鳴箏此夜同月隱青絲聞亂葉霜空瑶柱度飛鴻湘靈錦瑟愁停鼓子晉鸞笙愧未工況有周郎歌白雪興來那放酒樽空浮亭夜集縱酒閒亭歌復悲那堪春草思離離朱門按劒誰先達滄海論心愧後期郭裏鶯聲驚雨歇津邊栁色向坡垂題詩寄逺無持贈偏憶追陪到習池浮亭夜集贈黃二江淮千里久思君髙館相逢興不群孤燭青燈人共醉淡河疏雨夜初分心懷慷慨空悲梗世事飄颻秖似雲良㑹未窮簪盍意莫因歸興又紛紛送仲彬胡公之荆南華館清談酒未醺春風送客又離群髙堂念别情先切把袂同心跡暫分征斾還辭閩嶠月布帆輕揚楚江雲懸知别後空梁夢應有新詩最憶君送人之京江亭客散斂餘暉忽聽離歌淚滿衣滄海驚蓬浮世在青春得桂少年稀梅邊飛雪行人度雨外空江去鴈微明到長安春更好五陵花栁正依依送人之海南殷勤斗酒送君行一曲驪駒對粵城秋草愁心同北望夕陽去路獨南征寒山月落青楓晚野戍霜空白鴈晴年少功名應苦節臨流未可濯長纓送林一歸山中楝花雨裏醉逢迎南國看山又送行求侶暗驚春草色還家愁逐暮江聲殘陽向野聞邊笛逺樹登樓見海城誰念長沙遷謫久懶從季卜問君平洽公房送林敏珠宮客到夕陽時西望鄉園欲淚垂芳草不堪多卧病青山何事又分離髙原暮火行人盡積雨長天去鴈遲暫醉一杯乘興地對君誰復憶凄其送余司馬歸晉中驄馬朝來欲渡河官城把袂惜蹉跎滄洲舊業驚蓬斷白馬流年倚劒過梨葉烟村行客少鷓鴣陵苑夕陽多天涯相憶知何處空有愁心對酒歌送逸人之嶺南把酒離筵江上青水亭客散雨冥冥心懷遠道頻看劒跡向南天秖類萍孤驛城頭晴見樹片帆海上夜浮星知君此去堪乘興何必臨岐涕淚零送林十一歸山青門長笛起愁聲滄海離杯感故情賔館芰荷清夜語鄉山砧杵暮秋行浮雲北去無蹤跡旅鴈南歸有弟兄莫歎蹉跎向年少古人白首尚躬耕送李安之建安緑槐宮樹一蟬聲歧路相看萬里情對酒謾因愁逺别臨流還可濯長纓孤帆夜火洲邊驛淡月疏星栁外城遙想溪山更乘興閒居獨羡子雲名懷林外史騷人别去易蹉跎門掩浮亭長薜蘿北闕才名嗟放逐西鏞親友念經過醉題候館桐花早歸夢鄉山夜雨多料得登臨多勝事南州詞賦復如何㑹林南宮宅懷鄭二閒吟秋草思無窮却喜親朋此夜同外史閒亭歡對酒浮丘滄海暗驚蓬疏砧候館空江上逺火人家積雨中别後深懷書信否天涯愁絶送飛鴻晚日杉關荒苔古道斂微曛馬上笳聲不可聞地自亂離民舍少山當閩楚客程分長林積雨寒為雪深樹孤峰濕作雲愧我舊遊見關吏也將書劒學終軍次鐔津呈董書記楝花時候憶同遊況復懷君此泊舟千里歸心逢臘盡幾家落日倚門愁山鐘杳杳前朝寺烟水悠悠古建州何事相思不相見爾來應被白雲留與任本立長河二月栁隂隂客舍看春感越吟和氣不應消白髮寒灰終未變丹心湘潭鴈去江蘺逺夕照鶯啼谷樹深共道長卿歸卧病青山應笑又投簪送馬秀才下第歸江南嗟君失意賦歸休家在滄洲憶舊遊灞上栁條牽客悵江南草色向人愁山城落日寒吹角水國連天夜泊舟莫歎青春誤年少古來白首未封侯送客歸江州悠悠草色醉離樽送子東歸欲斷魂洛社分攜孤劒去潯陽耆舊幾家存湓江浪白潮通海楚地山青栁在門若見别來相識問風波此日不堪論送薛居士和州讀書西風征鴈去翩翩聞道攜書泛楚船左氏賦成曽十載董生帷下又三年讀書小館山當戶舊業巢湖水作田聖代秖今逢掖貴莫令嵗月易流連送人入蜀江亭把酒唱離歌遊子扁舟發汝沱草色到江知地盡猿聲入峽覺山多水流深向荆門出棧道遙從樹杪過去去蜀中應計日相思明日復如何宿淮浦寄司空文明思君深夜百憂新淮浦東頭問去津千里楚天初度鴈兩河明月未歸人從風自歎成黃葉臨水空思采白蘋知己飄零有如此舊遊那復洛陽春登餘干城醉向東風覽物華江山誰使後人嗟蒼烟古壘危三戶白髮遺民更幾家城上當時誰駐馬雲中落日有啼鴉登臨莫用懷今古愁絶湖橋酒幔斜賈誼宅少年何事到長沙此處翻成謫宦家地濕楚鄉秋雨後草深甲第夕陽斜清湘東去人空弔盛世南遷衆所嗟我亦為君長太息懶將書劒客天涯早春江上逢兵曹望君江浦草離離馬上相逢淚欲垂賦就張衡雖不樂途窮阮籍復何之山含碧樹鶯啼早雨散江亭客去遲暫醉一杯乘興地風流莫道昔年時積雨輞川莊上短褐山中荷篠時東菑風雨共棲遲久從野老田間餉深負林僧竹下期梨葉烟村聞布榖桃花潭水隱鸕鷀懸知别墅安農意此外餘生空爾為酬暢當尋嵩山麻道士少室尋真羡獨經唯應大道本無形龍飛水殿晴驅雨鶴繞天壇夜禮星望氣逺臨關樹紫看山空對藥爐青那應一問烟霞思願得長遊且駐齡答馬秀才學書學劒事悠悠況是棲遲未白頭顧影夕陽空北望驚心大火復西流亂山背水孤城晚獨樹臨關一葉秋君亦尚為南郡客遍題尺牘問窮愁晚次鄂州孤城吹角水漫漫近夕波搖舟次灘峽口砧聲江上度武昌樹色月中看南天渺渺懷人逺北斗蒼蒼向客寒流落水雲千萬里不知何處是長安鳴盛集卷三
