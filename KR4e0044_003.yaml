body:
  text: 鳴盛集卷三明林鴻撰七言古體雪蓬散人草書歌雪蓬散人有媯裔翰墨遊心與神契摹臨祕帖追晉風揮灑雄文明古制蓽門鐵限人爭求荒郊瘞筆應成丘嫵媚雲霞晴變態傾斜風雨寒颼颼伊豫與君共鄉縣結交自昔忘貧賤銜杯拓落膽氣豪江樓野寺書題遍借問君書初若何君言妙悟應聞歌諧音本自車振鐸渙汗有類風行波乃知至理無不寓要在髙人㑹其趣古來入室唯逸少後者升堂有懷素當代如君誠亦稀莫嘆蹉跎一布衣有錢沽酒與君飲醉卧目送孤鴻飛寄王六校文兼似吳二太守京師三月春雪飛雪後餘寒添著衣曹官祿薄酒苦貴一飲百錢恆不醉忽然停杯憶鄉里美髯校文最知已作詩斷不讓髙岑醉後狂吟狂欲死有時忽得意竟上金雞山彈琴酌酒送飛鳥心比白雲閒更閒虎頭岩前栁拖地龍池溪上花滿灣醉歸騎得將軍馬城上烏棲門未關白頭太守别來久别後還能相憶否詞賦終為紙上塵功名不及杯中酒芭蕉葉長近何如前月人來不寄書莫言閩海少飛鴈何事秦淮多鯉魚寄蔡殷少年所性尚遊俠夜讀古書朝射獵相逢然諾重千金性命由來輕一葉自言濩落長如此豈謂年光若流水當時意氣何足論今日為儒人共鄙以兹俯仰向時流窮居古巷仍百憂拘鈐禮法坐桎梏鞭撻童稚生仇讎浮雲世態我何有寧甘落魄耽杯酒閔子長懷汶上田桓公謾賦湘潭栁日夕長吟思故山樊籠尚掩冲霄翰知君懷抱亦如此一為君歌行路難贈浮丘生浮丘生能逺遊不學羽客棲丹丘挑簦荷笠來滄洲我昔冥棲向溟渤攜書共讀東山月舊遊冠蓋半凋零見子翻令心內熱羡子有逺志放形天地間扁舟濯足望雲海短策振衣登雪山太行北上連鴈門燕臺鄴宮無復存國士由來死知已令人感激思平原諸侯門深少知遇回轅又復歸南楚醉裏行吟七澤秋燈前卧聽三湘雨吾知浮丘心迹竒世人悠悠那得知草書古篆更神妙擊劒彈棊無不為嚴冬别我寒蕭索尊酒都門為君酌車輪遙遙忽不見唯見千山雪花落送林子山之閩中覲親釣鱸橋頭流水香冬青花開榕葉凉壚頭酌酒送行客醉後狂吟成短章世人懷别多慘愴念君此行何坦蕩云是嚴君在武威十年著盡逺遊衣鴻鴈緘中空寄逺魚龍川上苦思歸以兹出門心草草拂衣便向長安道古戍飛霜馬色寒重關曙月雞聲早自古秦川亦壯哉三峰華嶽掌中開溫泉緑樹朧朧見渭水黃河曲曲來邊庭相見悲復喜白髮依依問鄉里九月狐裘尚覺寒千鍾黍酒難成醉聞道東還未有期隴頭好寄折梅詩翻思人世皆為客何必臨岐是别離贈曽鋼二十讀書通大義三十結交江海士不學寰中一豎儒寧為世上竒男子同遊冠蓋多如雲佩章綰綬何紛紛東序詩書崇四術汝南節義宗三君問君拂衣何太早知君有親今已老鄉夢不離青浦雲歸心只在方山道城南栁花吹客衣車驂祖餞生光輝共傾濁酒江上别獨攜明月山中歸歸來鄉井宛如昨耕石飲泉貧亦樂閉戶從教水鳥啼垂帷不省山花落逹節非關學隱淪至人舒卷道為鄰君看古來霄漢上多是尋常畎畝人賦得獨樹邊淮送人之京君不見秦淮水流東到海淮邊獨樹如車蓋九月微霜赤葉乾枯枝颯颯鳴天籟枝上啼鴉散曙烟枝頭殘照咽寒蟬離人留飲停車騎俠客相逢挂馬鞭南國髙僧從此去駐錫雨花臺下路一飯淮邊洗鉢時六時宴坐祇園樹野鶴孤雲任去還禪心不道别離難山中亦有長松樹待爾青青共嵗寒張子紘畫梅歌人間百卉競春曄獨有梅花窮晚節嚴冬雪霰白皚皚此花凌寒今始開繁英淡蕊乍踈密群仙佩玉紛瑶臺最憐橫月出修竹不分隨風委緑苔三星處士乘槎客毫素天機寫生色興來揮灑與時人貴宦持錢求不得千枝萬朵宮苑腴枯梢冷萼山澤癯風流閒雅韻自别照水橫崖體總殊妙墨移來茅屋裏半幅溪藤露春意入戶幽禽訝影斜開門野衲疑香至古來畫者亦紛紛今日閩南獨數君不用雪窗花滿樹對兹亦可玩羲墳懷李郁李君本是清狂者十載畋漁向原野梅生豈厭官位卑閔子由來宦清寡自言濩落可終身誰知尺組能縻人朋遊失路各分散妻孥寄食家仍貧荒凉廨宇炎江表椎髻山氓語如鳥地隔三苗洞穴多天連五嶺人烟少三年無書增我憂憶君翻令懷舊遊開元寺裏猿鳥暮洞天岩前木葉秋襟期相遇每如此魂夢悠悠共千里白髮關山自月明青山茅屋空流水八月江南鴻鴈飛天邊誰寄早秋詩不如飲酒且安命振翼雲霄尚未遲過髙逸人别墅識子何不早見子即傾倒世人意氣不相合顔色雖同心草草子有園林東海濵香名滿耳人共聞梁鴻避世身不仕孔融愛客家常貧兹晨飲客青山墅新壓葡萄酒如乳緑樹穿窗鳥當歌紅條拂地花能舞醉來興逸無不為投壺擊劒仍彈棊人生得意有如此世上悠悠那得知月夜聞李生彈箏歌越客本浩蕩秦箏何激揚浮亭子夜月色古一曲萬籟鳴清商初聞楚調聲激烈志士報讎思飲血再聞宮音如扣鐘魯生揖讓何雍容清和變調有如此俠客聞之心欲死銀甲彈來更嫣然金魚脫却渾輕爾吾聞錦瑟五十絃湘靈夜鼓聲凄然遂令帝子剖其半遺音尚有秦人傳秦音楚調聲雖異今古由來同一致燕市誰知擊筑心吳門孰識吹簫意今夜聞君鼓曲聲百杯不醉壯心橫衆賔枕籍秋衾冷獨倚髙梧看月明春夜𤣥默處士燕集得滿字三月六日天微和博士水亭乘醉過主人解衣即沽酒外史扣壺能嘯歌歌殘夜久星移換新月蒼蒼捲羅幔萬事空嗟白髮新一壺共對清尊滿子有園林東海潯十載校書甘陸沈平生獨抱飲水節有時或賦還山吟髙齊宴坐探𤣥默時輩狂馳交不得自分綈袍比草青直將富貴輕雲白豫本南宮淡蕩人與君交誼最相親相逢且盡杯中物遙憶風流席上珍為廣上人賦歸雲山房道山老禪七十餘閉門不出祇園居心將明月同清淨跡比閒雲能卷舒蕭散浮雲閒更閒因風也或到人間晴教海上千峰出暝與天邊一鶴還歸雲寂寂山房暝明月蒼蒼僧入定禪心無著雲無蹤一塵不染諸緣空山中有僧人不聞世上流俗徒紛紛願為松下小童子閒與髙僧掃白雲送林汝學之雷州省伯四月閩南梅雨凉荔枝花開滿樹香青門酌酒送行客極浦揚帆辭故鄉君家從父從戎久海外書回驚白首離筵正值落花初客路仍逢歸鴈後知君所重在連枝觸熱投荒應不辭少年意氣有如此世上悠悠那得知雷陽咫尺滄溟近戍卒相逢問鄉信蛟室風來白浪腥龍淵日落青天盡嗟豫有姪亦離居萬里炎荒久荷殳天涯亭上應相見為報平安尺素書經綺岫故宮行人曉飯青山裏驅馬蒼茫經洛水昔聞綺岫盛繁華不謂荒凉今若此憶昔行宫初搆時梯岩駕壑相逶迤美人桂殿夜看月公子柘弓朝射麋翠華一去金門鎖露殿飛螢山葉墮往事吹殘牧笛風危基半入樵人火今古消沈能幾回春風依舊野花開君王巡狩不復見禾黍空山鳥雀哀送王孝廉之京神如玉壺初薦氷氣如太阿新發硎羡君早年即登第許君壯節終成名十年濩落棲衡宇斂翅回翔待髙翥知已文章舉孝廉治安有策干明主以兹擲筆翻然起祖道車驂若流水客路遙侵朔鴈前鄉情却望江天裏客路鄉情兩地分征帆落葉共紛紛君登要路天門去我向秋山卧白雲賦得無諸城送浦舍人源歸晉陵君不見昔時無諸城荒丘斷隴今人耕陵谷湮沈知幾代古人精靈竟何在憶昔無諸全盛時都城百雉何逶迤連營國步分秦土繪衮王章入漢儀山河巍巍那可恃躍馬屠龍今已矣列國猶傳赤帝封曲臺尚對滄江水滄江水流去不還故宮落日不堪看寶衣夜化空陵火弓劒秋懸古殿寒故人西歸從此去策馬秋蕪城下路欲將陳迹問行人落葉紛紛不知處賦得芭蕉雨野人獨宿祇樹林大千飛雨秋隂隂懸燈照影不成寐颯颯蕭蕭窗外音初焉洶湧海濤急又若飛泉㵼蒼壁雲山夜靜木客吟水鄉秋冷鮫人泣宮非宮霜天氣肅鳴豐鐘商非商秋風落葉隨飛揚角非角簌簌江城古梅落徴音羽音是耶非嘈嘈切切鳴天機碎若珠璣落寒玉清如素指調金徽蹇豫平素耽禪說欲悟音聞猶未徹由來大聽本希聲不信雷轟平地裂今夕微吟挂月樓明朝騎馬粵王州聲殘響絶無所見惟見芭蕉一葉秋送秦山人歸天台天台山人薜蘿衣别豫東將海上歸心如月塞征鴻逺興逐秋城落葉飛人間萬事歸來好脫屣侯門迹如掃樓外孤霞映赤城窗前片月生滄島飛佩須過鴈蕩峰繫舟先聽若耶鐘丹光夜繞三珠樹鶴影秋歸五粒松執手河橋酒半醒小山别後桂青青願祈海上烟霞祕長保塵中犬馬齡鐔上送僧歸衡山上人孤閒似雲鶴十五出家住衡嶽說法能超最上禪持心不受群疑縳世上誰知來去蹤南窺太華北遊嵩衲經鴈蕩千峰雪定入峨嵋半夜鐘于今戒臘青松古猶泛慈航到東土楊栁瓶中九曲雲笋皮笠上三山雨昨夜歸心繞楚天西風杖錫又茫然化龍潭畔清秋别回鴈峰頭舊日禪林七欽山莊此君家住浯水西喬林夾道緣青溪人淳上古大庭世客到武陵花處迷深杯盡日見山色髙枕四時聞鳥啼籬根稚笋看成竹階下飛花踏作泥梓栁折來環藥圃野泉引得灌蔬畦人間鐘鼎口不道雨裏田園手自犁已沾雞黍遂然諾豫愁冠蓋將離暌明日却從城市去林間相送草萋萋巫峽啼猿歌送丘少府歸四明巫山巫峽連三巴猿啼三聲客思家停舟聽之聲未了却過青枝猶裊裊野人乍來錦官城清秋滿峽啼猿聲黃牛灘上怨楓落白帝祠前哀月明商聲清冽羽聲亂倐忽東崖復西澗久客聞之淚欲乾壯夫聽此魂亦斷故人歸卧越山雲憶得啼猿歌送君扁舟獨宿剡溪夜呌月三聲誰共聞初秋送友人之冶城賦得把字行人飲馬秋城下魯酒千鍾為君把離亭正值鴈驚寒候館仍逢雨侵夜嗟豫十年恆壯遊登髙弔逺無所憂襟期脫略向知已生事蕭條隨野鷗南宮作吏歸來久富貴浮雲我何有三品寧論小隱資百壺且醉平生酒露島烟汀岊水濆風帆桂櫂坐離分題詩為寄漁樵友惜别還看鴻鴈群寄陳八參軍憶昔讀書融水陽青山影裏開茅堂結交由來重意義使酒或可輕侯王誰言一旦風塵起故里蕭條半荆杞立身自許致功名報國誰能論生死爾時正值烟塵昏手攜俘首懸轅門春風走馬緑楊道落日臂鷹秋草原功成期將書幕府當路忌才棄如土部曲營殘殺氣消關山夢醒秋聲苦此來為儒逢太清石田蕪沒荒春耕當時冠蓋半丘土此日交情結弟兄交遊惟君年最髙每以連枝朂我曹天邊落日見孤鴈海上秋風吹二毛劒水無情入海流憑將䨥淚到炎州願為鄉曲牧童子與子髙歌同飯牛贈商生與子交遊最年少羡子襟期可同調醉墨能噓海上雲春箋㑹拂花間鳥壯遊海內早知名每以才華動九卿丹穴殊看鳳毛貴方諸逺在氷壺清伊豫十年歸未得貧賤由來愛賔客雖乏床頭沽酒錢未嘗一日無顔色西鏞城下醉相逢南國新秋意萬重石竹山前滄海月紫雲洞口夕陽鐘義象行有象有象來天都大江欲渡心趦趄誘之既渡獻天子拜跪不與衆象俱象奴勸之拜怒鼻觸象奴賜酒不肯飲哺之亦不餔屹然十日受飢渴俯首垂淚憤且吁天子命殺之衆官束手莫敢屠侍衛傳宣麾壯士被甲各執丈二殳象戰久不克兵捷象乃殂憶昔君王每巡幸象當法駕行天衢珊瑚錯落明月珠被服美錦紅氍毹紫泥函封載玉璽萬樂爭擁群龍趍玉璽歸沙漠龍亦歸鼎湖所以老象心南來誓死骨為枯嗟爾食祿人空負七尺軀髙髙白玉堂赫赫黃金符伊昔軒冕今泥塗嗟爾食祿人不若飯豆芻象何潔爾何汚天子垂衣治萬世俾全象德行天誅嗚呼象兮古所無嗚呼象兮古所無行路難君不見東鄰翁昔時零落誰與同一朝精金等糞土結交豪客何其雄兒孫生長羅綺裏舊妻新